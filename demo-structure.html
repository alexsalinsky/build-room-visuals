<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo &middot; 4 minutes or less</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #fafafa;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 80px;
  }
  .wrap {
    width: 100%;
    max-width: 1080px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }
  .head { text-align: center; }
  .head h1 {
    font-size: clamp(64px, 11vw, 132px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 0.95;
    color: #1a1a1a;
  }
  .head .sub {
    margin-top: 18px;
    font-size: clamp(20px, 2.6vw, 28px);
    font-weight: 500;
    color: #555;
    letter-spacing: 0.2px;
  }
  .rule {
    width: 64px;
    height: 3px;
    background: #1a1a1a;
    margin: 4px auto 0;
    border-radius: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .card {
    background: #ffffff;
    border: 2.5px solid #1a1a1a;
    border-radius: 12px;
    padding: 28px 28px 30px;
    display: flex;
    gap: 22px;
    align-items: flex-start;
    min-height: 168px;
  }
  .num {
    flex: 0 0 auto;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
  }
  .text {
    font-size: clamp(20px, 2.2vw, 26px);
    font-weight: 600;
    line-height: 1.3;
    color: #1a1a1a;
    padding-top: 6px;
  }
  .text em {
    font-style: italic;
    font-weight: 600;
    color: #444;
  }

  footer {
    margin-top: 56px;
    font-size: 14px;
    color: #888;
    letter-spacing: 0.4px;
    text-align: center;
  }

  @media (max-width: 720px) {
    .stage { padding: 32px 16px 56px; }
    .wrap { gap: 36px; }
    .grid { grid-template-columns: 1fr; gap: 14px; }
    .card { min-height: 0; padding: 22px; gap: 18px; }
    .num { width: 48px; height: 48px; font-size: 22px; }
    .head h1 { letter-spacing: -1px; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="wrap">
    <div class="head">
      <h1>Demo</h1>
      <div class="sub">4 minutes or less</div>
      <div class="rule"></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="num">1</div>
        <div class="text">What I wanted to solve</div>
      </div>
      <div class="card">
        <div class="num">2</div>
        <div class="text">How I solved it <em>(ta-da!)</em></div>
      </div>
      <div class="card">
        <div class="num">3</div>
        <div class="text">What I might try next</div>
      </div>
      <div class="card">
        <div class="num">4</div>
        <div class="text">What I learned about working with LLMs</div>
      </div>
    </div>

    <footer>Alex Salinsky &middot; The Build Room</footer>
  </div>
</div>
</body>
</html>
