<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How to Store Your Credentials · The Build Room</title>
<style>
  /* Build Room design tokens (inlined for portability + because GitHub Pages
     ignores underscore-prefixed dirs like _template/, so the external tokens.css
     was 404'ing in production). */
  :root {
    --br-text:        #1a1a1a;
    --br-bg:          #fafafa;
    --br-card-bg:     #ffffff;
    --br-gray-1:      #444;
    --br-gray-2:      #555;
    --br-gray-3:      #666;
    --br-gray-4:      #888;
    --br-gray-5:      #999;
    --br-rule:        #ddd;
    --br-rule-soft:   #eee;
    --br-font:        -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    --br-mono:        ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --br-h1:          68px;
    --br-h2:          36px;
    --br-h3:          22px;
    --br-body:        20px;
    --br-lead:        24px;
    --br-meta:        14px;
    --br-space-1:     8px;
    --br-space-2:     14px;
    --br-space-3:     18px;
    --br-space-4:     24px;
    --br-radius-sm:   6px;
    --br-radius-lg:   12px;
    --br-border:      2.5px solid var(--br-text);
    --br-border-thin: 1.5px solid var(--br-text);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--br-bg);
    color: var(--br-text);
    font-family: var(--br-font);
    overflow: hidden;
  }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 14px; }
  .slide-wrap { flex: 1; max-height: 88vh; width: 100%; max-width: 1180px; display: flex; align-items: center; justify-content: center; padding: 40px 32px 96px; position: relative; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 12px; font-weight: 700; color: var(--br-gray-5); letter-spacing: 2px; text-transform: uppercase; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: var(--br-h1); font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 18px; }
  h2 { font-size: var(--br-h2); font-weight: 700; line-height: 1.15; margin-bottom: var(--br-space-3); letter-spacing: -0.5px; }
  h3 { font-size: var(--br-h3); font-weight: 600; margin-bottom: var(--br-space-1); color: var(--br-gray-1); }
  p  { font-size: var(--br-body); line-height: 1.5; color: #333; margin-bottom: var(--br-space-2); }
  p.lead { font-size: var(--br-lead); color: var(--br-text); }
  p.small { font-size: 16px; color: var(--br-gray-3); }

  code { font-family: var(--br-mono); font-size: 0.92em; background: #f3f4f6; color: var(--br-text); padding: 2px 7px; border-radius: 4px; border: 1px solid #e5e7eb; }
  pre { background: #1e1e1e; color: #e5e7eb; padding: 14px 18px; border-radius: 10px; overflow-x: auto; font-family: var(--br-mono); font-size: 14px; line-height: 1.55; margin: 8px 0; }
  pre .c { color: #6b9955; }
  pre .k { color: #9cdcfe; }
  pre .v { color: #ce9178; }
  pre .r { color: #f87171; font-weight: 700; }
  pre .g { color: #4ade80; font-weight: 700; }

  /* ---- FILE TREE: the load-bearing recurring visual ---- */
  .tree {
    font-family: var(--br-mono);
    font-size: 16px;
    line-height: 1.5;
    background: #1e1e1e;
    color: #e5e7eb;
    padding: 14px 20px;
    border-radius: 10px;
    display: inline-block;
    text-align: left;
    min-width: 420px;
  }
  .tree .row { display: block; padding: 0 6px; border-radius: 3px; white-space: pre; }
  .tree .branch { color: #6b7280; }
  .tree .name   { color: #e5e7eb; }
  .tree .name.dotfile { color: #fcd34d; }
  .tree .name.folder  { color: #93c5fd; }
  .tree .note   { color: #6b9955; margin-left: 14px; }
  .tree .row.hi { background: rgba(252, 211, 77, 0.18); }
  .tree .row.hi .name { color: #fde68a; font-weight: 700; }
  .tree .row.hi .note { color: #fde68a; }
  .tree .row.danger { background: rgba(239, 68, 68, 0.22); }
  .tree .row.danger .name { color: #fca5a5; font-weight: 700; }
  .tree .row.danger .note { color: #fca5a5; }
  .tree .row.dimmed { opacity: 0.35; text-decoration: line-through; }
  .tree .row.ok .name { color: #86efac; }

  .tree-caption { font-size: 14px; color: var(--br-gray-3); margin-top: 8px; font-style: italic; }

  .split { display: grid; grid-template-columns: auto 1fr; gap: 32px; align-items: center; margin-top: 14px; }
  .split.flip { grid-template-columns: 1fr auto; }
  .split .copy h3 { margin-bottom: 10px; }
  .split .copy p { font-size: 18px; }

  .floor { background: var(--br-text); color: var(--br-bg); padding: 22px 28px; border-radius: 12px; font-size: 20px; line-height: 1.5; font-weight: 500; max-width: 880px; }
  .floor strong { font-weight: 800; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
  .do, .dont { background: #fff; border-radius: 12px; padding: 18px 22px; border: var(--br-border); }
  .do .head, .dont .head { font-size: 12px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase; padding: 4px 12px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
  .do .head { background: #16a34a; color: #fff; }
  .dont .head { background: #b91c1c; color: #fff; }
  ul.tight { list-style: none; padding: 0; margin: 0; }
  ul.tight li { font-size: 16px; line-height: 1.5; color: #333; padding-left: 18px; position: relative; margin-bottom: 8px; }
  ul.tight li::before { content: "\2022"; position: absolute; left: 4px; color: var(--br-text); font-weight: 700; }

  .warn { background: #fef3c7; border-left: 4px solid #b91c1c; padding: 12px 16px; font-size: 16px; line-height: 1.5; color: var(--br-text); border-radius: 4px; margin-top: 12px; }
  .warn strong { color: #b91c1c; }

  .rotate-links { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .rotate-links a { color: var(--br-text); text-decoration: underline; font-size: 17px; }

  .example-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
  .example-grid .full { grid-column: 1 / -1; }
  .file-label { font-size: 12px; font-weight: 700; color: var(--br-gray-4); letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 4px; font-family: var(--br-mono); }

  .gitstatus { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 14px; }
  .gitstatus .card-bad, .gitstatus .card-good { border-radius: 12px; padding: 16px 18px; border: var(--br-border); background: #fff; }
  .gitstatus .label { font-size: 12px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px; color: #fff; }
  .gitstatus .card-bad  .label { background: #b91c1c; }
  .gitstatus .card-good .label { background: #16a34a; }
  .gitstatus pre { margin: 0; font-size: 13px; }

  /* HUD navigation */
  .hud { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 24px; align-items: center; font-size: var(--br-meta); color: var(--br-gray-3); background: rgba(250,250,250,0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 999px; border: 1px solid #e5e7eb; z-index: 1000; }
  .hud strong { color: var(--br-text); font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: var(--br-card-bg); color: var(--br-text); border: var(--br-border-thin); padding: 8px 18px; border-radius: var(--br-radius-sm); cursor: pointer; font-size: var(--br-meta); font-weight: 500; z-index: 1001; touch-action: manipulation; }
  button:hover { background: var(--br-text); color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: var(--br-card-bg); color: var(--br-text); }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }
  .br-footer { position: fixed; bottom: 8px; left: 14px; font-size: 11px; color: var(--br-gray-4); letter-spacing: 0.5px; }

  @media (max-width: 720px) {
    :root { --br-h1: 44px; --br-h2: 28px; --br-body: 17px; --br-lead: 20px; }
    .grid-2, .example-grid, .gitstatus, .split { grid-template-columns: 1fr; }
    .tree { font-size: 14px; min-width: 0; width: 100%; }
    .slide-wrap { padding: 16px 18px 90px; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-wrap" id="slideWrap"></div>
</div>
<div class="hud">
  <div class="controls">
    <button id="prev">&larr; Prev</button>
    <button id="next">Next &rarr;</button>
  </div>
  <div><strong id="counter">1</strong> / <span id="total">9</span></div>
</div>
<div class="hint">&larr; &rarr; arrow keys, swipe on mobile</div>
<div class="br-footer">Alex Salinsky &middot; The Build Room</div>

<script>
// Reusable file-tree fragment. Each scene passes a `mode` to highlight different rows.
// Modes: "intro", "env", "gitignore", "gitsees", "leak", "clean"
function tree(mode) {
  const cls = {
    env:       (mode === 'env')       ? 'hi'     : '',
    gitignore: (mode === 'gitignore') ? 'hi'     : '',
    envGitSees:(mode === 'gitsees')   ? 'dimmed' : (mode === 'leak' ? 'danger' : ''),
    readme:    (mode === 'gitsees' || mode === 'clean') ? 'ok' : '',
    main:      (mode === 'gitsees' || mode === 'clean') ? 'ok' : '',
  };
  const envNote = {
    intro:     'your keys live here',
    env:       'your keys live here',
    gitignore: 'your keys live here',
    gitsees:   'hidden from git ✓',
    leak:      'PUSHED TO GITHUB',
    clean:     'safe on your laptop',
  }[mode] || 'your keys live here';
  const giNote = {
    intro:     'tells git what to skip',
    env:       'tells git what to skip',
    gitignore: 'add .env on the first line',
    gitsees:   'tracked, safe to share',
    leak:      'missing or wrong',
    clean:     'tracked, safe to share',
  }[mode] || 'tells git what to skip';

  return `<div class="tree" aria-label="project file tree">
<span class="row"><span class="name folder">my-project/</span></span>
<span class="row ${cls.gitignore}"><span class="branch">├── </span><span class="name dotfile">.gitignore</span><span class="note"># ${giNote}</span></span>
<span class="row ${cls.envGitSees || cls.env}"><span class="branch">├── </span><span class="name dotfile">.env</span><span class="note"># ${envNote}</span></span>
<span class="row ${cls.readme}"><span class="branch">├── </span><span class="name">README.md</span></span>
<span class="row"><span class="branch">└── </span><span class="name folder">src/</span></span>
<span class="row"><span class="branch">    └── </span><span class="name ${cls.main ? 'ok' : ''}">main.py</span></span>
</div>`;
}

const slides = [

  // 1. Title
  {
    html: `<div class="slide center">
      <div class="section-chip">Setup &amp; Hygiene</div>
      <h1 style="margin-top:30px">How to Store<br>Your Credentials</h1>
      <p class="lead" style="color:var(--br-gray-3);font-weight:400;max-width:760px;margin-top:4px">
        API keys are passwords. This is the floor for handling them so you don't leak one in week one.
      </p>
      <div style="margin-top:24px">${tree('intro')}</div>
      <p class="tree-caption" style="margin-top:6px">Two dotfiles at the root of every project. That's the whole story.</p>
    </div>`
  },

  // 2. The pattern: .env at root
  {
    html: `<div class="slide">
      <div class="section-chip">The Pattern</div>
      <h2 style="margin-top:24px">One <code>.env</code> file at the project root</h2>
      <div class="split">
        <div>${tree('env')}</div>
        <div class="copy">
          <p>Plain text file named <code>.env</code> (with the leading dot). Every API key and token goes here, one per line.</p>
          <p class="small">Your scripts, your AI assistant, any tool you build, all read keys from this one file. Change a key once, in one place.</p>
        </div>
      </div>
<pre><span class="c"># Format: no quotes, no spaces around =, one per line</span>
<span class="k">OPENAI_API_KEY</span>=<span class="v">sk-proj-XXXXXXXXXXXXXXXXXXXXXXXX</span>
<span class="k">ANTHROPIC_API_KEY</span>=<span class="v">sk-ant-XXXXXXXXXXXXXXXXXXXXXXXX</span>
<span class="k">GITHUB_TOKEN</span>=<span class="v">ghp_XXXXXXXXXXXXXXXXXXXXXXXX</span></pre>
    </div>`
  },

  // 3. .gitignore
  {
    html: `<div class="slide">
      <div class="section-chip">Hide It From GitHub</div>
      <h2 style="margin-top:24px">Add <code>.env</code> to <code>.gitignore</code> first</h2>
      <div class="split flip">
        <div class="copy">
          <p>Before you ever commit, create a second dotfile at the project root called <code>.gitignore</code>. Put this on the first line:</p>
<pre style="margin-top:6px">.env</pre>
          <p class="small" style="margin-top:8px">That tells Git to never track, never upload, never sync your <code>.env</code>. Without this line, the first time you push to GitHub, your keys go public.</p>
        </div>
        <div>${tree('gitignore')}</div>
      </div>
      <p style="margin-top:10px;font-size:17px"><strong style="color:#b91c1c">Order matters.</strong> Create <code>.gitignore</code> first. Then create <code>.env</code>. Then start adding keys.</p>
    </div>`
  },

  // 4. What git actually sees (before/after)
  {
    html: `<div class="slide">
      <div class="section-chip">What Git Actually Sees</div>
      <h2 style="margin-top:24px"><code>git status</code>: before vs after</h2>
      <div class="gitstatus">
        <div class="card-bad">
          <div class="label">Without .gitignore</div>
<pre>$ git status
Untracked files:
  <span class="r">.env</span>
  README.md
  src/main.py</pre>
          <p class="small" style="margin-top:8px">Your keys are about to be committed. One <code>git add .</code> and they're staged.</p>
        </div>
        <div class="card-good">
          <div class="label">With .gitignore</div>
<pre>$ git status
Untracked files:
  <span class="g">.gitignore</span>
  README.md
  src/main.py</pre>
          <p class="small" style="margin-top:8px"><code>.env</code> doesn't appear. Git is ignoring it. Safe to commit and push.</p>
        </div>
      </div>
      <div style="margin-top:14px;text-align:center">
        ${tree('gitsees')}
        <p class="tree-caption">What git sees: <code>.env</code> dimmed out. Still on your laptop, never leaves it.</p>
      </div>
    </div>`
  },

  // 5. Edit it yourself
  {
    html: `<div class="slide">
      <div class="section-chip">Edit It Yourself</div>
      <h2 style="margin-top:24px">Paste the key in by hand. Not through the LLM.</h2>
      <p>Open <code>.env</code> in a plain text editor (VS Code, Notepad, TextEdit). Paste the key. Save.</p>
      <p><strong>Do not</strong> ask your AI assistant to add the key for you. The moment you paste a key into a chat, it's in that transcript, possibly in logs, and definitely visible on your screen during any screen-share.</p>
      <p style="margin-top:6px">Instead, tell the assistant where to find it:</p>
<pre><span class="c"># What you say to the LLM:</span>
The key is in .env as <span class="k">OPENAI_API_KEY</span>. Read it from there.</pre>
      <p class="small">The assistant reads the file from disk, uses the key, and never has to see it printed in the chat.</p>
    </div>`
  },

  // 6. Do / Don't
  {
    html: `<div class="slide">
      <div class="section-chip">Do &amp; Don't</div>
      <h2 style="margin-top:24px">The short version</h2>
      <div class="grid-2">
        <div class="do">
          <div class="head">Do</div>
          <ul class="tight">
            <li>Keep one <code>.env</code> per project, at the project root</li>
            <li>Add <code>.env</code> to <code>.gitignore</code> before your first commit</li>
            <li>Edit <code>.env</code> in a text editor yourself</li>
            <li>Reference keys by name when talking to your AI assistant</li>
            <li>Rotate any key you suspect was seen by anyone</li>
          </ul>
        </div>
        <div class="dont">
          <div class="head">Don't</div>
          <ul class="tight">
            <li>Paste a key into Skool, Slack, Discord, or any chat thread</li>
            <li>Screenshot a key, even partially</li>
            <li>Screen-share with <code>.env</code> open and no redaction</li>
            <li>Commit <code>.env</code> to GitHub, ever, even once</li>
            <li>Email a key to a teammate (use a password manager)</li>
          </ul>
        </div>
      </div>
    </div>`
  },

  // 7. If you leak: rotate
  {
    html: `<div class="slide">
      <div class="section-chip">If You Leak One</div>
      <h2 style="margin-top:24px">Rotate. Don't just delete.</h2>
      <div class="split">
        <div>${tree('leak')}
          <p class="tree-caption" style="color:#b91c1c">If <code>.env</code> ends up here, bots see it in minutes.</p>
        </div>
        <div class="copy">
          <p>Deleting the commit, the message, or the screenshot is not enough. Bots and caches see it before you can pull it back.</p>
          <p><strong>The fix is to rotate.</strong> Go to the provider, revoke the old key, generate a new one, paste it into <code>.env</code>. The leaked key is now useless.</p>
        </div>
      </div>
      <div class="warn"><strong>Rotation order:</strong> issue the new key first, swap it in <code>.env</code>, confirm your build still works, then revoke the old one. This keeps your build running through the swap.</div>
      <div class="rotate-links">
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Anthropic API keys</a>
        <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">OpenAI API keys</a>
        <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">GitHub personal access tokens</a>
      </div>
    </div>`
  },

  // 8. Worked example
  {
    html: `<div class="slide">
      <div class="section-chip">A Worked Example</div>
      <h2 style="margin-top:36px;font-size:30px">Three files at the project root</h2>
      <div class="example-grid" style="gap:14px;margin-top:8px">
        <div>
          <div class="file-label">.gitignore</div>
<pre style="font-size:13px;padding:10px 14px;margin:4px 0">.env
node_modules/
__pycache__/</pre>
        </div>
        <div>
          <div class="file-label">.env</div>
<pre style="font-size:13px;padding:10px 14px;margin:4px 0"><span class="c"># Never commit this file.</span>
<span class="k">OPENAI_API_KEY</span>=<span class="v">sk-proj-XXXX</span>
<span class="k">ANTHROPIC_API_KEY</span>=<span class="v">sk-ant-XXXX</span></pre>
        </div>
        <div class="full">
          <div class="file-label">src/main.py</div>
<pre style="font-size:13px;padding:10px 14px;margin:4px 0"><span class="c"># Load the file, then read keys by name. Never paste the value into code.</span>
from dotenv import load_dotenv
import os

load_dotenv()
key = os.getenv("<span class="k">OPENAI_API_KEY</span>")</pre>
        </div>
      </div>
      <p class="small" style="margin-top:8px">Node uses <code>dotenv</code>. The pattern is the same everywhere: load the file, read keys by name.</p>
    </div>`
  },

  // 9. Close
  {
    html: `<div class="slide center">
      <h2 style="margin-top:20px;font-size:44px;line-height:1.15;max-width:880px">
        Treat every API key like a password.
      </h2>
      <p class="lead" style="margin-top:14px;max-width:720px;color:var(--br-gray-2)">
        One <code>.env</code> at the root. <code>.gitignore</code> before the first commit. Hand-edit, never through chat. If it leaks, rotate.
      </p>
      <div style="margin-top:22px">${tree('clean')}</div>
      <p style="margin-top:18px;font-size:16px;color:var(--br-gray-4)">Follow the pattern every time and you won't leak one in week one.</p>
    </div>`
  }
];

let i = 0;
const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === slides.length - 1;
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < slides.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

// Touch swipe
let touchStartX = null;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener("touchend", (e) => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) { if (dx < 0) next.click(); else prev.click(); }
  touchStartX = null;
});

render();
</script>
</body>
</html>
