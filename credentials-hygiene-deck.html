<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How to Store Your Credentials — The Build Room</title>
<link rel="stylesheet" href="_template/tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--br-bg);
    color: var(--br-text);
    font-family: var(--br-font);
    overflow: hidden;
  }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 14px; }
  .slide-wrap { flex: 1; max-height: 82vh; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: center; padding: 24px 32px 96px; position: relative; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 12px; font-weight: 700; color: var(--br-gray-5); letter-spacing: 2px; text-transform: uppercase; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: var(--br-h1); font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 18px; }
  h2 { font-size: var(--br-h2); font-weight: 700; line-height: 1.15; margin-bottom: var(--br-space-4); letter-spacing: -0.5px; }
  h3 { font-size: var(--br-h3); font-weight: 600; margin-bottom: var(--br-space-2); color: var(--br-gray-1); }
  p  { font-size: var(--br-body); line-height: 1.55; color: #333; margin-bottom: var(--br-space-2); }
  p.lead { font-size: var(--br-lead); color: var(--br-text); }

  code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.92em; background: #f3f4f6; color: var(--br-text); padding: 2px 7px; border-radius: 4px; border: 1px solid #e5e7eb; }
  pre { background: #1e1e1e; color: #e5e7eb; padding: 16px 20px; border-radius: 10px; overflow-x: auto; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 15px; line-height: 1.55; margin: 10px 0; }
  pre .c { color: #6b9955; }
  pre .k { color: #9cdcfe; }
  pre .v { color: #ce9178; }

  .floor { background: var(--br-text); color: var(--br-bg); padding: 26px 30px; border-radius: 12px; font-size: 22px; line-height: 1.5; font-weight: 500; max-width: 880px; }
  .floor strong { font-weight: 800; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 16px; }
  .do, .dont { background: #fff; border-radius: 12px; padding: 22px 24px; border: var(--br-border); }
  .do .head, .dont .head { font-size: 12px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase; padding: 4px 12px; border-radius: 10px; display: inline-block; margin-bottom: 12px; }
  .do .head { background: #16a34a; color: #fff; }
  .dont .head { background: #b91c1c; color: #fff; }
  ul.tight { list-style: none; padding: 0; margin: 0; }
  ul.tight li { font-size: 17px; line-height: 1.5; color: #333; padding-left: 20px; position: relative; margin-bottom: 9px; }
  ul.tight li::before { content: "•"; position: absolute; left: 4px; color: var(--br-text); font-weight: 700; }

  .warn { background: #fef3c7; border-left: 4px solid #b91c1c; padding: 14px 18px; font-size: 17px; line-height: 1.5; color: var(--br-text); border-radius: 4px; margin-top: 14px; }
  .warn strong { color: #b91c1c; }

  .rotate-links { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .rotate-links a { color: var(--br-text); text-decoration: underline; font-size: 18px; }
  .rotate-links a:hover { background: var(--br-text); color: #fff; text-decoration: none; padding: 1px 4px; border-radius: 3px; }

  .example-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 10px; }
  .example-grid .full { grid-column: 1 / -1; }
  .file-label { font-size: 13px; font-weight: 700; color: var(--br-gray-4); letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 6px; }

  /* HUD navigation */
  .hud { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 24px; align-items: center; font-size: var(--br-meta); color: var(--br-gray-3); background: rgba(250,250,250,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 999px; border: 1px solid #e5e7eb; z-index: 1000; }
  .hud strong { color: var(--br-text); font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: var(--br-card-bg); color: var(--br-text); border: var(--br-border-thin); padding: 8px 18px; border-radius: var(--br-radius-sm); cursor: pointer; font-size: var(--br-meta); font-weight: 500; z-index: 1001; touch-action: manipulation; }
  button:hover { background: var(--br-text); color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: var(--br-card-bg); color: var(--br-text); }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }

  .br-footer { position: fixed; bottom: 8px; left: 14px; font-size: 11px; color: var(--br-gray-4); letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-wrap" id="slideWrap"></div>
</div>
<div class="hud">
  <div class="controls">
    <button id="prev">← Prev</button>
    <button id="next">Next →</button>
  </div>
  <div><strong id="counter">1</strong> / <span id="total">8</span></div>
</div>
<div class="hint">← → arrow keys, swipe on mobile</div>
<div class="br-footer">Alex Salinsky · The Build Room</div>

<script>
const slides = [

  // 1. Title
  {
    html: `<div class="slide center">
      <div class="section-chip">Setup &amp; Hygiene</div>
      <h1 style="margin-top:40px">How to Store<br>Your Credentials</h1>
      <p class="lead" style="font-size:26px;color:var(--br-gray-3);font-weight:400;max-width:760px;margin-top:8px">
        API keys are passwords. This is the floor for handling them so you don't leak one in week one.
      </p>
      <div class="floor" style="margin-top:36px">
        One <strong>.env</strong> file at the root of your project. Every key lives there.
        Add <strong>.env</strong> to <strong>.gitignore</strong> before your first commit.
        Never paste a key into chat.
      </div>
    </div>`
  },

  // 2. The pattern: .env at root
  {
    html: `<div class="slide">
      <div class="section-chip">The Pattern</div>
      <h2 style="margin-top:30px">One <code>.env</code> file at the project root</h2>
      <p>Plain text file named <code>.env</code> (with the leading dot). Every API key and token your build uses goes in this file. One per line.</p>
<pre><span class="c"># Format: no quotes, no spaces around the equals sign, one per line</span>
<span class="k">OPENAI_API_KEY</span>=<span class="v">sk-proj-XXXXXXXXXXXXXXXXXXXXXXXX</span>
<span class="k">ANTHROPIC_API_KEY</span>=<span class="v">sk-ant-XXXXXXXXXXXXXXXXXXXXXXXX</span>
<span class="k">GITHUB_TOKEN</span>=<span class="v">ghp_XXXXXXXXXXXXXXXXXXXXXXXX</span></pre>
      <p>Your AI assistant, your scripts, and any tool you build all read keys from this one file. When a key changes, you change it in one place.</p>
    </div>`
  },

  // 3. .gitignore
  {
    html: `<div class="slide">
      <div class="section-chip">Hide It From GitHub</div>
      <h2 style="margin-top:30px">Add this line to <code>.gitignore</code> first</h2>
      <p>Before you ever commit, create a second file at the project root called <code>.gitignore</code> and put this in it:</p>
<pre>.env</pre>
      <p>That tells Git to never track, never upload, never sync your <code>.env</code> file. Without this line, the first time you push to GitHub, your keys go public.</p>
      <p style="margin-top:8px"><strong style="color:#b91c1c">Order matters.</strong> Add the <code>.gitignore</code> line first. Then create the <code>.env</code>. Then start adding keys.</p>
      <p style="font-size:16px;color:var(--br-gray-3);margin-top:14px">Bots scan public GitHub for new keys constantly. Leaks get exploited in minutes, not days.</p>
    </div>`
  },

  // 4. Edit it yourself, not through the LLM
  {
    html: `<div class="slide">
      <div class="section-chip">Edit It Yourself</div>
      <h2 style="margin-top:30px">Paste the key in by hand. Not through the LLM.</h2>
      <p>Open <code>.env</code> in a plain text editor (VS Code, Notepad, TextEdit). Paste the key in by hand. Save.</p>
      <p><strong>Do not</strong> ask your AI assistant to add the key for you. The moment you paste a key into a chat, it's in that chat's transcript, possibly in logs, possibly in training pipelines depending on the tool, and definitely visible on your screen during any screen-share.</p>
      <p style="margin-top:8px">Instead, tell the assistant where to find it:</p>
<pre><span class="c"># What you say to the LLM:</span>
The key is in .env as <span class="k">OPENAI_API_KEY</span>. Read it from there.</pre>
      <p style="font-size:16px;color:var(--br-gray-3)">The assistant reads the file from disk, uses the key, never has to see it printed in the chat.</p>
    </div>`
  },

  // 5. Do / Don't grid
  {
    html: `<div class="slide">
      <div class="section-chip">Do &amp; Don't</div>
      <h2 style="margin-top:30px">The short version</h2>
      <div class="grid-2">
        <div class="do">
          <div class="head">Do</div>
          <ul class="tight">
            <li>Keep one <code>.env</code> per project, at the project root</li>
            <li>Add <code>.env</code> to <code>.gitignore</code> before your first commit</li>
            <li>Edit <code>.env</code> in a text editor yourself</li>
            <li>Reference keys by name when talking to your AI assistant</li>
            <li>Rotate any key you suspect was seen by anyone</li>
          </ul>
        </div>
        <div class="dont">
          <div class="head">Don't</div>
          <ul class="tight">
            <li>Paste a key into Skool, Slack, Discord, or any chat thread</li>
            <li>Screenshot a key, even partially</li>
            <li>Screen-share with <code>.env</code> open and no redaction</li>
            <li>Commit <code>.env</code> to GitHub, ever, even once</li>
            <li>Email a key to a teammate (use a password manager)</li>
          </ul>
        </div>
      </div>
    </div>`
  },

  // 6. If you leak: rotate, don't just delete
  {
    html: `<div class="slide">
      <div class="section-chip">If You Leak One</div>
      <h2 style="margin-top:30px">Rotate. Don't just delete.</h2>
      <p>Assume the key is compromised the moment it lands anywhere public. Deleting the commit, deleting the message, deleting the screenshot is not enough. Bots and caches see it before you can pull it back.</p>
      <p><strong>The fix is to rotate.</strong> Go to the provider, revoke the old key, generate a new one, paste it into <code>.env</code>. The leaked one is now useless.</p>
      <div class="warn"><strong>Rotation order:</strong> issue the new key first, swap it in <code>.env</code>, confirm your build still works, then revoke the old one. This keeps your build running through the swap.</div>
      <div class="rotate-links">
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Anthropic API keys</a>
        <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">OpenAI API keys</a>
        <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">GitHub personal access tokens</a>
      </div>
    </div>`
  },

  // 7. Worked example
  {
    html: `<div class="slide">
      <div class="section-chip">A Worked Example</div>
      <h2 style="margin-top:24px">Three files at the project root</h2>
      <div class="example-grid">
        <div>
          <div class="file-label">.gitignore</div>
<pre>.env
node_modules/
__pycache__/</pre>
        </div>
        <div>
          <div class="file-label">.env</div>
<pre><span class="c"># Never commit this file.</span>
<span class="k">OPENAI_API_KEY</span>=<span class="v">sk-proj-XXXX</span>
<span class="k">ANTHROPIC_API_KEY</span>=<span class="v">sk-ant-XXXX</span>
<span class="k">GITHUB_TOKEN</span>=<span class="v">ghp_XXXX</span></pre>
        </div>
        <div class="full">
          <div class="file-label">How code reads it (Python)</div>
<pre><span class="c"># Load the file, then read keys by name. Never paste the value into code.</span>
from dotenv import load_dotenv
import os

load_dotenv()
key = os.getenv("<span class="k">OPENAI_API_KEY</span>")</pre>
        </div>
      </div>
      <p style="font-size:16px;color:var(--br-gray-3);margin-top:8px">Node uses <code>dotenv</code>. The pattern is the same everywhere: load the file, read keys by name.</p>
    </div>`
  },

  // 8. Close
  {
    html: `<div class="slide center">
      <h2 style="margin-top:30px;font-size:48px;line-height:1.15;max-width:880px">
        Treat every API key like a password.
      </h2>
      <p class="lead" style="margin-top:18px;max-width:720px;color:var(--br-gray-2)">
        One <code>.env</code> at the root. <code>.gitignore</code> before the first commit. Hand-edit, never through chat. If it leaks, rotate.
      </p>
      <p style="margin-top:30px;font-size:16px;color:var(--br-gray-4)">Follow the pattern every time and you won't leak one in week one.</p>
    </div>`
  }
];

let i = 0;
const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === slides.length - 1;
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < slides.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

// Touch swipe
let touchStartX = null;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener("touchend", (e) => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) { if (dx < 0) next.click(); else prev.click(); }
  touchStartX = null;
});

render();
</script>
</body>
</html>
