<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" preserveAspectRatio="xMidYMid meet" font-family="Inter, system-ui, -apple-system, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #2d4a3e; stroke-width: 2; }
    .box-accent { fill: #2d4a3e; stroke: #2d4a3e; stroke-width: 2; }
    .box-soft { fill: #f3ece1; stroke: #2d4a3e; stroke-width: 2; }
    .lbl { font-size: 14px; fill: #1a1a1a; }
    .lbl-sub { font-size: 11px; fill: #555; }
    .lbl-white { font-size: 16px; fill: #ffffff; font-weight: 600; }
    .title { font-size: 22px; fill: #1a1a1a; font-weight: 700; letter-spacing: 2px; }
    .note { font-size: 10px; fill: #777; font-style: italic; }
    .arrow { stroke: #2d4a3e; stroke-width: 1.8; fill: none; }
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d4a3e"/>
    </marker>
  </defs>

  <!-- Email/Newsletter left lane -->
  <rect x="20" y="60" width="120" height="640" class="box-soft" rx="8"/>
  <text x="80" y="370" class="lbl" text-anchor="middle" transform="rotate(-90 80 370)" font-weight="600">Email / Newsletter</text>
  <text x="80" y="395" class="lbl-sub" text-anchor="middle" transform="rotate(-90 80 395)">cross-funnel lane</text>

  <!-- Source row -->
  <g>
    <rect x="170" y="60" width="180" height="80" class="box" rx="8"/>
    <text x="260" y="92" class="lbl" text-anchor="middle" font-weight="600">Other people's</text>
    <text x="260" y="110" class="lbl" text-anchor="middle" font-weight="600">audiences</text>
    <text x="260" y="128" class="lbl-sub" text-anchor="middle">warm intros, partner lists</text>
  </g>
  <g>
    <rect x="370" y="60" width="180" height="80" class="box" rx="8"/>
    <text x="460" y="92" class="lbl" text-anchor="middle" font-weight="600">Our accounts</text>
    <text x="460" y="110" class="lbl-sub" text-anchor="middle">Alex + Build Room</text>
    <text x="460" y="126" class="lbl-sub" text-anchor="middle">IG · LinkedIn · Skool · email</text>
  </g>
  <g>
    <rect x="570" y="60" width="180" height="80" class="box" rx="8"/>
    <text x="660" y="92" class="lbl" text-anchor="middle" font-weight="600">Affiliates /</text>
    <text x="660" y="110" class="lbl" text-anchor="middle" font-weight="600">Influencers</text>
  </g>
  <g>
    <rect x="770" y="60" width="180" height="80" class="box" rx="8"/>
    <text x="860" y="100" class="lbl" text-anchor="middle" font-weight="600">Ads</text>
    <text x="860" y="120" class="lbl-sub" text-anchor="middle">paid acquisition</text>
  </g>

  <!-- Arrows sources -> webinar -->
  <path d="M260,140 C260,200 500,200 500,240" class="arrow" marker-end="url(#ar)"/>
  <path d="M460,140 L500,240" class="arrow" marker-end="url(#ar)"/>
  <path d="M660,140 C660,200 500,200 500,240" class="arrow" marker-end="url(#ar)"/>
  <path d="M860,140 C860,200 500,200 500,240" class="arrow" marker-end="url(#ar)"/>
  <path d="M140,200 C300,200 400,220 460,245" class="arrow" marker-end="url(#ar)"/>

  <!-- Webinar -->
  <rect x="370" y="245" width="260" height="80" class="box-accent" rx="10"/>
  <text x="500" y="280" class="lbl-white" text-anchor="middle">WEBINAR</text>
  <text x="500" y="302" font-size="12" fill="#f3ece1" text-anchor="middle">centerpiece conversion event</text>

  <!-- Webinar -> CC, DC -->
  <path d="M440,325 L320,400" class="arrow" marker-end="url(#ar)"/>
  <path d="M560,325 L680,400" class="arrow" marker-end="url(#ar)"/>

  <!-- CC -->
  <rect x="200" y="405" width="240" height="90" class="box" rx="8"/>
  <text x="320" y="435" class="lbl" text-anchor="middle" font-weight="700" font-size="18">CC</text>
  <text x="320" y="458" class="lbl" text-anchor="middle">Cohort</text>
  <text x="320" y="478" class="lbl-sub" text-anchor="middle">4-week core program</text>

  <!-- DC -->
  <rect x="560" y="405" width="240" height="90" class="box" rx="8"/>
  <text x="680" y="435" class="lbl" text-anchor="middle" font-weight="700" font-size="18">DC</text>
  <text x="680" y="458" class="lbl" text-anchor="middle">Day Cohort</text>
  <text x="680" y="478" class="lbl-sub" text-anchor="middle">shorter / intensive format</text>

  <!-- arrows to retreat -->
  <path d="M320,495 L450,560" class="arrow" marker-end="url(#ar)"/>
  <path d="M680,495 L550,560" class="arrow" marker-end="url(#ar)"/>

  <!-- Retreat -->
  <rect x="370" y="565" width="260" height="70" class="box-accent" rx="10"/>
  <text x="500" y="595" class="lbl-white" text-anchor="middle">RETREAT</text>
  <text x="500" y="615" font-size="12" fill="#f3ece1" text-anchor="middle">PDC · Chiang Mai · future</text>

  <!-- arrow to membership -->
  <path d="M500,635 L500,665" class="arrow" marker-end="url(#ar)"/>

  <!-- Membership -->
  <rect x="340" y="670" width="320" height="55" class="box-soft" rx="8"/>
  <text x="500" y="695" class="lbl" text-anchor="middle" font-weight="600">Membership / Alumni</text>
  <text x="500" y="712" class="lbl-sub" text-anchor="middle">recurring revenue · community continuity</text>

  <!-- Title -->
  <text x="500" y="752" class="title" text-anchor="middle">FUNNEL</text>

  <!-- Footnote -->
  <text x="160" y="746" class="note">* CC/DC initials ambiguous from source; labeled best-guess (Cohort / Day Cohort)</text>

  <!-- author footer -->
  <text x="980" y="752" font-size="10" fill="#999" text-anchor="end">Alex Salinsky / The Build Room</text>
</svg>
