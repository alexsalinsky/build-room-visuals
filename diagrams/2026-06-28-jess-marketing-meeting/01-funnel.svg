<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" preserveAspectRatio="xMidYMid meet" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrow-upsell" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d4a3e"/>
    </marker>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 14px; fill: #555; }
      .box-source { fill: #fdf6ed; stroke: #d4a574; stroke-width: 2; }
      .box-anchor { fill: #fff4e8; stroke: #e87f3a; stroke-width: 2.5; }
      .box-product { fill: #f0f5ee; stroke: #5b8c5a; stroke-width: 2; }
      .box-membership { fill: #f4eef8; stroke: #9d6cb5; stroke-width: 2; }
      .box-tbd { fill: #ffffff; stroke: #888; stroke-width: 1.5; stroke-dasharray: 5,3; }
      .box-label { font-size: 15px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
      .box-sub { font-size: 11px; fill: #555; text-anchor: middle; font-style: italic; }
      .row-label { font-size: 12px; font-weight: 700; fill: #888; letter-spacing: 1.5px; }
      .arrow-label { font-size: 11px; fill: #555; text-anchor: middle; font-style: italic; }
      .arrow-label-emphasis { font-size: 11px; fill: #2d4a3e; text-anchor: middle; font-weight: 600; }
      .footer { font-size: 11px; fill: #888; text-anchor: middle; }
      .arrow-line { stroke: #1a1a1a; stroke-width: 1.8; fill: none; }
      .arrow-dashed { stroke: #888; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
      .arrow-upsell { stroke: #2d4a3e; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; }
      .note-text { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <rect width="1280" height="920" fill="#ffffff"/>

  <text x="640" y="40" class="title" text-anchor="middle">The Build Room Funnel</text>
  <text x="640" y="62" class="subtitle" text-anchor="middle">Sources feed channels feed products. Three products live at the same level. Membership is the alumni layer downstream.</text>

  <text x="60" y="115" class="row-label">SOURCES</text>

  <rect x="100" y="130" width="200" height="70" rx="8" class="box-source"/>
  <text x="200" y="160" class="box-label">Other People's</text>
  <text x="200" y="178" class="box-label">Audiences</text>
  <text x="200" y="194" class="box-sub">partner lists, intros</text>

  <rect x="340" y="130" width="200" height="70" rx="8" class="box-source"/>
  <text x="440" y="160" class="box-label">Our Accounts</text>
  <text x="440" y="178" class="box-sub">IG, LinkedIn, Alex's</text>
  <text x="440" y="192" class="box-sub">personal network</text>

  <rect x="580" y="130" width="170" height="70" rx="8" class="box-source"/>
  <text x="665" y="170" class="box-label">Ads</text>
  <text x="665" y="188" class="box-sub">retreats only</text>

  <rect x="790" y="130" width="240" height="70" rx="8" class="box-source"/>
  <text x="910" y="160" class="box-label">Community /</text>
  <text x="910" y="178" class="box-label">Newsletter</text>
  <text x="910" y="194" class="box-sub">free Skool, email list, alumni</text>

  <path d="M 300 165 L 340 165" class="arrow-line" marker-end="url(#arrow)"/>

  <text x="60" y="305" class="row-label">CHANNEL</text>

  <rect x="500" y="320" width="280" height="90" rx="10" class="box-anchor"/>
  <text x="640" y="358" class="box-label" font-size="20">WEBINAR</text>
  <text x="640" y="378" class="box-sub">aka Kickoff Session — live, with pitch + Stripe link</text>
  <text x="640" y="395" class="box-sub">central conversion event</text>

  <path d="M 440 200 L 440 250 L 580 250 L 580 320" class="arrow-line" marker-end="url(#arrow)"/>
  <path d="M 665 200 L 665 320" class="arrow-line" marker-end="url(#arrow)"/>
  <path d="M 910 200 L 910 250 L 740 250 L 740 320" class="arrow-line" marker-end="url(#arrow)"/>

  <text x="60" y="525" class="row-label">PRODUCTS (same level)</text>

  <rect x="120" y="540" width="240" height="100" rx="10" class="box-product"/>
  <text x="240" y="572" class="box-label" font-size="18">CC</text>
  <text x="240" y="592" class="box-label">Closed Cohort</text>
  <text x="240" y="610" class="box-sub">private / booked</text>
  <text x="240" y="624" class="box-sub">teams, orgs</text>

  <rect x="520" y="540" width="240" height="100" rx="10" class="box-product"/>
  <text x="640" y="572" class="box-label" font-size="18">OC</text>
  <text x="640" y="592" class="box-label">Open Cohort</text>
  <text x="640" y="610" class="box-sub">individuals join</text>
  <text x="640" y="624" class="box-sub">monthly cadence</text>

  <rect x="920" y="540" width="240" height="100" rx="10" class="box-product"/>
  <text x="1040" y="585" class="box-label" font-size="18">RETREAT</text>
  <text x="1040" y="610" class="box-sub">5-day immersive</text>
  <text x="1040" y="624" class="box-sub">PDC, Chiang Mai</text>

  <path d="M 640 410 L 640 540" class="arrow-line" marker-end="url(#arrow)"/>
  <path d="M 780 380 C 880 380, 1040 440, 1040 540" class="arrow-line" marker-end="url(#arrow)"/>

  <path d="M 750 165 C 1100 165, 1190 340, 1160 540" class="arrow-dashed" marker-end="url(#arrow-dashed)"/>
  <text x="1180" y="365" class="arrow-label" text-anchor="end">ads → retreat (direct)</text>

  <path d="M 870 200 C 800 240, 400 400, 240 540" class="arrow-dashed" marker-end="url(#arrow-dashed)"/>
  <text x="380" y="430" class="arrow-label" text-anchor="middle">community / newsletter</text>
  <text x="380" y="444" class="arrow-label" text-anchor="middle">feeds all three products</text>

  <path d="M 950 200 C 1100 280, 1100 440, 1080 540" class="arrow-dashed" marker-end="url(#arrow-dashed)"/>

  <rect x="120" y="450" width="240" height="60" rx="6" class="box-tbd"/>
  <text x="240" y="472" class="note-text" text-anchor="middle" font-weight="700" fill="#888">CC path = TBD</text>
  <text x="240" y="488" class="note-text" text-anchor="middle">Webinar probably won't sell this.</text>
  <text x="240" y="502" class="note-text" text-anchor="middle">Likely: LPI London, conferences,</text>
  <text x="240" y="515" class="note-text" text-anchor="middle" font-style="italic">direct outreach. Figure out as we go.</text>

  <path d="M 360 600 C 600 700, 800 700, 920 600" class="arrow-upsell" marker-end="url(#arrow-upsell)"/>
  <text x="640" y="730" class="arrow-label-emphasis">cohorts can upsell into retreats</text>

  <path d="M 760 605 C 840 640, 880 640, 920 605" class="arrow-upsell" marker-end="url(#arrow-upsell)"/>

  <text x="60" y="800" class="row-label">ALUMNI LAYER</text>

  <rect x="480" y="815" width="320" height="70" rx="10" class="box-membership"/>
  <text x="640" y="848" class="box-label" font-size="17">MEMBERSHIP / ALUMNI</text>
  <text x="640" y="868" class="box-sub">gated · format + price TBD by Feb 2027</text>

  <path d="M 240 640 C 240 750, 480 800, 540 815" class="arrow-line" marker-end="url(#arrow)"/>
  <path d="M 640 640 L 640 815" class="arrow-line" marker-end="url(#arrow)"/>
  <path d="M 1040 640 C 1040 750, 800 800, 740 815" class="arrow-line" marker-end="url(#arrow)"/>

  <text x="640" y="908" class="footer">Alex Salinsky / The Build Room · marketing-sprint-v1.md</text>
</svg>
