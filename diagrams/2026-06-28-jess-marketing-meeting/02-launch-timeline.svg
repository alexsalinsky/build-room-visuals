<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" preserveAspectRatio="xMidYMid meet" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 14px; fill: #555; }
      .swimlane-title { font-size: 20px; font-weight: 700; fill: #1a1a1a; }
      .swimlane-sub { font-size: 13px; fill: #555; font-style: italic; }
      .axis-line { stroke: #1a1a1a; stroke-width: 2; }
      .tick-line { stroke: #888; stroke-width: 1; stroke-dasharray: 2,3; }
      .tick-label { font-size: 12px; fill: #555; text-anchor: middle; font-weight: 600; }
      .event-label { font-size: 13px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
      .event-sub { font-size: 11px; fill: #555; text-anchor: middle; }
      .stage-label { font-size: 12px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
      .buying-zone-label { font-size: 13px; fill: #2d4a3e; font-weight: 700; text-anchor: middle; }
      .anchor-label { font-size: 14px; fill: #1a1a1a; font-weight: 700; text-anchor: middle; }
      .legend-label { font-size: 12px; fill: #1a1a1a; }
      .footer { font-size: 11px; fill: #888; text-anchor: middle; }
      .compare-label { font-size: 13px; fill: #2d4a3e; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>

  <text x="640" y="40" class="title" text-anchor="middle">The Build Room Launch Engine</text>
  <text x="640" y="62" class="subtitle" text-anchor="middle">Relative-time pattern. Cohort = 7-week cycle. Retreat = 12-week cycle. Anchored on the live event (T0).</text>

  <!-- COHORT TRACK -->
  <g transform="translate(0, 110)">
    <text x="60" y="0" class="swimlane-title">Cohort Launch</text>
    <text x="60" y="20" class="swimlane-sub">7-week cycle. Buying zone extends 3 weeks past Kickoff Session via TSLS.</text>

    <rect x="640" y="55" width="270" height="120" fill="#2d4a3e" fill-opacity="0.08" rx="4"/>
    <text x="775" y="48" class="buying-zone-label">BUYING ZONE (3 weeks)</text>

    <line x1="80" y1="110" x2="1200" y2="110" class="axis-line"/>

    <line x1="200" y1="100" x2="200" y2="180" class="tick-line"/>
    <text x="200" y="195" class="tick-label">T-4wk</text>
    <circle cx="200" cy="110" r="6" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="200" y="85" class="event-label">Pre-marketing</text>
    <text x="200" y="100" class="event-sub">begins</text>

    <line x1="420" y1="100" x2="420" y2="180" class="tick-line"/>
    <text x="420" y="195" class="tick-label">T-2wk</text>
    <circle cx="420" cy="110" r="6" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="420" y="85" class="event-label">Marketing wave</text>
    <text x="420" y="100" class="event-sub">(first public post)</text>

    <line x1="640" y1="100" x2="640" y2="220" class="axis-line"/>
    <text x="640" y="235" class="anchor-label">T0</text>
    <circle cx="640" cy="110" r="11" fill="#e87f3a" stroke="#1a1a1a" stroke-width="2"/>
    <text x="640" y="82" class="event-label" font-size="14">KICKOFF SESSION</text>
    <text x="640" y="98" class="event-sub">live event · pitch · Stripe link</text>

    <line x1="755" y1="100" x2="755" y2="180" class="tick-line"/>
    <text x="755" y="195" class="tick-label">T+1wk</text>
    <circle cx="755" cy="110" r="8" fill="#e87f3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="755" y="85" class="event-label">TSLS</text>
    <text x="755" y="100" class="event-sub">tech setup / ledger</text>

    <line x1="870" y1="100" x2="870" y2="180" class="tick-line"/>
    <text x="870" y="195" class="tick-label">T+2wk</text>
    <circle cx="870" cy="110" r="6" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="870" y="85" class="event-label">Cohort S1</text>

    <line x1="970" y1="105" x2="970" y2="180" class="tick-line"/>
    <text x="970" y="195" class="tick-label">T+3wk</text>
    <circle cx="970" cy="110" r="5" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="970" y="92" class="event-label">S2</text>

    <line x1="1070" y1="105" x2="1070" y2="180" class="tick-line"/>
    <text x="1070" y="195" class="tick-label">T+4wk</text>
    <circle cx="1070" cy="110" r="5" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="1070" y="92" class="event-label">S3</text>

    <line x1="1170" y1="105" x2="1170" y2="180" class="tick-line"/>
    <text x="1170" y="195" class="tick-label">T+5wk</text>
    <circle cx="1170" cy="110" r="5" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="1170" y="92" class="event-label">S4</text>

    <path d="M 200 250 L 200 240 L 1170 240 L 1170 250" stroke="#888" stroke-width="1" fill="none"/>
    <text x="685" y="265" class="stage-label" fill="#555">total cycle ≈ 9 weeks (pre-mktg through cohort close)</text>
  </g>

  <!-- KEY COMPARISON CALLOUT -->
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="1120" height="40" fill="#d4a574" fill-opacity="0.15" stroke="#d4a574" stroke-width="1.5" rx="6"/>
    <text x="20" y="25" class="compare-label">Why the cycles differ:</text>
    <text x="200" y="25" class="legend-label">Cohorts need ~3 weeks of buying zone. Product is virtual, ticket is small, decision is fast. Retreats need ~8 weeks. Travel costs lead time, ticket is 5-10x larger, attendees block calendars.</text>
  </g>

  <!-- RETREAT TRACK -->
  <g transform="translate(0, 470)">
    <text x="60" y="0" class="swimlane-title">Retreat Launch</text>
    <text x="60" y="20" class="swimlane-sub">12-week cycle. Buying zone = 8 weeks. Two Kickoff Sessions plus excite event(s) between.</text>

    <rect x="280" y="55" width="820" height="120" fill="#2d4a3e" fill-opacity="0.08" rx="4"/>
    <text x="690" y="48" class="buying-zone-label">BUYING ZONE (8 weeks)</text>

    <line x1="80" y1="110" x2="1200" y2="110" class="axis-line"/>

    <line x1="120" y1="100" x2="120" y2="180" class="tick-line"/>
    <text x="120" y="195" class="tick-label">T-12wk</text>
    <circle cx="120" cy="110" r="6" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="120" y="85" class="event-label">Pre-marketing</text>
    <text x="120" y="100" class="event-sub">begins</text>

    <line x1="200" y1="100" x2="200" y2="180" class="tick-line"/>
    <text x="200" y="195" class="tick-label">T-10wk</text>
    <circle cx="200" cy="110" r="6" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="200" y="85" class="event-label">Marketing wave 1</text>
    <text x="200" y="100" class="event-sub">(first public post)</text>

    <line x1="280" y1="100" x2="280" y2="220" class="axis-line"/>
    <text x="280" y="235" class="anchor-label">T-8wk</text>
    <circle cx="280" cy="110" r="11" fill="#e87f3a" stroke="#1a1a1a" stroke-width="2"/>
    <text x="280" y="82" class="event-label" font-size="14">KICKOFF SESSION 1</text>
    <text x="280" y="98" class="event-sub">tier 1 pricing opens</text>

    <line x1="480" y1="100" x2="480" y2="180" class="tick-line"/>
    <text x="480" y="195" class="tick-label">T-6wk</text>
    <rect x="475" y="105" width="10" height="10" fill="#9d6cb5" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="480" y="85" class="event-label">Excite event(s)</text>
    <text x="480" y="100" class="event-sub">keeps room warm</text>

    <line x1="690" y1="100" x2="690" y2="220" class="axis-line"/>
    <text x="690" y="235" class="anchor-label">T-4wk</text>
    <circle cx="690" cy="110" r="11" fill="#e87f3a" stroke="#1a1a1a" stroke-width="2"/>
    <text x="690" y="82" class="event-label" font-size="14">KICKOFF SESSION 2</text>
    <text x="690" y="98" class="event-sub">tier 2 pricing opens</text>

    <line x1="900" y1="100" x2="900" y2="180" class="tick-line"/>
    <text x="900" y="195" class="tick-label">T-2wk</text>
    <rect x="895" y="105" width="10" height="10" fill="#d4533a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="900" y="85" class="event-label">Scarcity push</text>
    <text x="900" y="100" class="event-sub">tier 3 pricing · last call</text>

    <line x1="1100" y1="100" x2="1100" y2="220" class="axis-line"/>
    <text x="1100" y="235" class="anchor-label">T0</text>
    <circle cx="1100" cy="110" r="13" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="2"/>
    <text x="1100" y="82" class="event-label" font-size="14">RETREAT</text>
    <text x="1100" y="98" class="event-sub">5 days · in person</text>

    <path d="M 120 250 L 120 240 L 1100 240 L 1100 250" stroke="#888" stroke-width="1" fill="none"/>
    <text x="610" y="265" class="stage-label" fill="#555">total cycle ≈ 12 weeks (pre-mktg through retreat close)</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(80, 710)">
    <circle cx="10" cy="0" r="6" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="25" y="4" class="legend-label">Marketing milestone</text>

    <circle cx="200" cy="0" r="8" fill="#e87f3a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="215" y="4" class="legend-label">Kickoff Session (live)</text>

    <rect x="380" y="-5" width="10" height="10" fill="#9d6cb5" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="395" y="4" class="legend-label">Excite event</text>

    <rect x="500" y="-5" width="10" height="10" fill="#d4533a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="515" y="4" class="legend-label">Scarcity push</text>

    <circle cx="640" cy="0" r="6" fill="#5b8c5a" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="655" y="4" class="legend-label">Cohort session / Retreat</text>

    <rect x="830" y="-8" width="16" height="16" fill="#2d4a3e" fill-opacity="0.15" rx="2"/>
    <text x="853" y="4" class="legend-label">Buying zone</text>
  </g>

  <text x="640" y="745" class="footer">Alex Salinsky / The Build Room · marketing-sprint-v1.md</text>
</svg>
