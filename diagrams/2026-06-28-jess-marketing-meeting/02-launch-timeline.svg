<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" font-family="Inter, system-ui, -apple-system, sans-serif">
  <style>
    .title { font-size: 22px; fill: #1a1a1a; font-weight: 700; letter-spacing: 2px; }
    .lane-label { font-size: 14px; fill: #2d4a3e; font-weight: 700; letter-spacing: 1px; }
    .date { font-size: 11px; fill: #555; }
    .ev { font-size: 12px; fill: #1a1a1a; font-weight: 600; }
    .ev-sub { font-size: 10px; fill: #666; }
    .axis { stroke: #2d4a3e; stroke-width: 2; }
    .tick { stroke: #2d4a3e; stroke-width: 1; }
    .buyzone { fill: #d4a574; opacity: 0.35; }
    .buyzone-label { font-size: 11px; fill: #8a5a1f; font-weight: 700; letter-spacing: 1px; }
    .dot { fill: #2d4a3e; }
    .dot-accent { fill: #d4a574; stroke: #2d4a3e; stroke-width: 2; }
    .runband { fill: #2d4a3e; opacity: 0.12; }
    .runband-label { font-size: 11px; fill: #2d4a3e; font-weight: 600; }
  </style>

  <text x="600" y="38" class="title" text-anchor="middle">LAUNCH TIMELINE</text>
  <text x="600" y="58" font-size="12" fill="#777" text-anchor="middle">Jun 15 → Nov 16 · two parallel tracks</text>

  <!-- X-axis dates: Jun15=100, Jul1=200, Jul15=300, Aug1=410, Aug15=510, Sep1=620, Sep15=720, Oct1=830, Oct15=940, Nov1=1050, Nov15=1150 -->

  <!-- COHORT LANE -->
  <text x="80" y="160" class="lane-label" text-anchor="end">COHORT</text>
  <line x1="90" y1="200" x2="1170" y2="200" class="axis"/>

  <!-- Buying zone band cohort: Jul15 (300) -> Jul28 (~390) -->
  <rect x="300" y="180" width="90" height="40" class="buyzone" rx="3"/>
  <text x="345" y="173" class="buyzone-label" text-anchor="middle">2-WK BUYING ZONE</text>

  <!-- Cohort 4-week run band: Jul 28 (390) -> Aug 25 (~580) -->
  <rect x="390" y="225" width="190" height="22" class="runband" rx="3"/>
  <text x="485" y="241" class="runband-label" text-anchor="middle">Cohort runs · 4 weeks (HW · TS · LS)</text>

  <!-- Events on cohort lane -->
  <g>
    <circle cx="100" cy="200" r="6" class="dot"/>
    <line x1="100" y1="200" x2="100" y2="120" class="tick"/>
    <text x="100" y="112" class="ev" text-anchor="middle">Pre-marketing</text>
    <text x="100" y="98" class="date" text-anchor="middle">Jun 15</text>
  </g>
  <g>
    <circle cx="200" cy="200" r="6" class="dot"/>
    <line x1="200" y1="200" x2="200" y2="130" class="tick"/>
    <text x="200" y="122" class="ev" text-anchor="middle">Marketing wave</text>
    <text x="200" y="108" class="date" text-anchor="middle">Jul 1</text>
  </g>
  <g>
    <circle cx="300" cy="200" r="8" class="dot-accent"/>
    <line x1="300" y1="200" x2="300" y2="140" class="tick"/>
    <text x="300" y="132" class="ev" text-anchor="middle">Webinar</text>
    <text x="300" y="118" class="date" text-anchor="middle">Jul 15</text>
  </g>
  <g>
    <circle cx="390" cy="200" r="6" class="dot"/>
    <text x="390" y="265" class="ev" text-anchor="middle">Cohort start</text>
    <text x="390" y="279" class="date" text-anchor="middle">Jul 28</text>
  </g>

  <!-- Divider -->
  <line x1="60" y1="340" x2="1170" y2="340" stroke="#ddd" stroke-dasharray="4 4"/>

  <!-- RETREAT LANE -->
  <text x="80" y="430" class="lane-label" text-anchor="end">RETREAT</text>
  <line x1="90" y1="470" x2="1170" y2="470" class="axis"/>

  <!-- Buying zone retreat: Sep15 (720) -> Nov16 (~1160) = 8 weeks -->
  <rect x="720" y="450" width="440" height="40" class="buyzone" rx="3"/>
  <text x="940" y="443" class="buyzone-label" text-anchor="middle">8-WK BUYING ZONE</text>

  <!-- pre-marketing band Jul15(300) -> Aug1(410) -->
  <rect x="300" y="495" width="110" height="20" class="runband" rx="3"/>
  <text x="355" y="510" class="runband-label" text-anchor="middle">Pre-marketing</text>

  <g>
    <circle cx="510" cy="470" r="8" class="dot-accent"/>
    <line x1="510" y1="470" x2="510" y2="400" class="tick"/>
    <text x="510" y="392" class="ev" text-anchor="middle">Webinar 1</text>
    <text x="510" y="378" class="date" text-anchor="middle">Aug 15</text>
  </g>
  <g>
    <circle cx="620" cy="470" r="6" class="dot"/>
    <line x1="620" y1="470" x2="620" y2="410" class="tick"/>
    <text x="620" y="402" class="ev" text-anchor="middle">Mid-marketing push</text>
    <text x="620" y="388" class="date" text-anchor="middle">Sep 1</text>
  </g>
  <g>
    <circle cx="720" cy="470" r="8" class="dot-accent"/>
    <line x1="720" y1="470" x2="720" y2="400" class="tick"/>
    <text x="720" y="392" class="ev" text-anchor="middle">Webinar 2 / Excite</text>
    <text x="720" y="378" class="date" text-anchor="middle">Sep 15</text>
  </g>
  <g>
    <circle cx="955" cy="470" r="8" class="dot-accent"/>
    <line x1="955" y1="470" x2="955" y2="545" class="tick"/>
    <text x="955" y="560" class="ev" text-anchor="middle">PDC Retreat</text>
    <text x="955" y="574" class="date" text-anchor="middle">Oct 16</text>
  </g>
  <g>
    <circle cx="1160" cy="470" r="8" class="dot-accent"/>
    <line x1="1160" y1="470" x2="1160" y2="545" class="tick"/>
    <text x="1160" y="560" class="ev" text-anchor="end">Chiang Mai Retreat</text>
    <text x="1160" y="574" class="date" text-anchor="end">Nov 16</text>
  </g>

  <!-- date axis labels bottom -->
  <g font-size="10" fill="#888">
    <text x="100" y="640" text-anchor="middle">Jun 15</text>
    <text x="200" y="640" text-anchor="middle">Jul 1</text>
    <text x="300" y="640" text-anchor="middle">Jul 15</text>
    <text x="410" y="640" text-anchor="middle">Aug 1</text>
    <text x="510" y="640" text-anchor="middle">Aug 15</text>
    <text x="620" y="640" text-anchor="middle">Sep 1</text>
    <text x="720" y="640" text-anchor="middle">Sep 15</text>
    <text x="830" y="640" text-anchor="middle">Oct 1</text>
    <text x="940" y="640" text-anchor="middle">Oct 15</text>
    <text x="1050" y="640" text-anchor="middle">Nov 1</text>
    <text x="1160" y="640" text-anchor="middle">Nov 16</text>
  </g>
  <line x1="90" y1="620" x2="1170" y2="620" stroke="#ccc"/>
  <g stroke="#ccc">
    <line x1="100" y1="618" x2="100" y2="624"/>
    <line x1="200" y1="618" x2="200" y2="624"/>
    <line x1="300" y1="618" x2="300" y2="624"/>
    <line x1="410" y1="618" x2="410" y2="624"/>
    <line x1="510" y1="618" x2="510" y2="624"/>
    <line x1="620" y1="618" x2="620" y2="624"/>
    <line x1="720" y1="618" x2="720" y2="624"/>
    <line x1="830" y1="618" x2="830" y2="624"/>
    <line x1="940" y1="618" x2="940" y2="624"/>
    <line x1="1050" y1="618" x2="1050" y2="624"/>
    <line x1="1160" y1="618" x2="1160" y2="624"/>
  </g>

  <!-- legend -->
  <g transform="translate(60, 670)">
    <circle cx="6" cy="-3" r="6" class="dot-accent"/>
    <text x="20" y="0" font-size="11" fill="#444">Webinar / Retreat date</text>
    <circle cx="180" cy="-3" r="5" class="dot"/>
    <text x="194" y="0" font-size="11" fill="#444">Milestone</text>
    <rect x="280" y="-9" width="18" height="12" class="buyzone"/>
    <text x="304" y="0" font-size="11" fill="#444">Buying zone</text>
    <rect x="410" y="-9" width="18" height="12" class="runband"/>
    <text x="434" y="0" font-size="11" fill="#444">Run / marketing band</text>
  </g>

  <text x="1190" y="690" font-size="10" fill="#999" text-anchor="end">Alex Salinsky / The Build Room</text>
</svg>
