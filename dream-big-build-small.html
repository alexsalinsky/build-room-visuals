<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dream Big, Build Small</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 12px; }
  .frame-wrap { flex: 1; max-height: 80vh; width: 100%; display: flex; align-items: center; justify-content: center; }
  svg { width: auto; height: auto; max-width: 100%; max-height: 100%; }
  .title-screen { font-size: 60px; font-weight: 700; text-align: center; color: #1a1a1a; letter-spacing: -1px; line-height: 1.1; }
  .title-screen .sub { display: block; font-size: 22px; font-weight: 400; margin-top: 18px; color: #666; letter-spacing: 0; }
  .caption { max-width: 920px; text-align: center; font-size: 18px; line-height: 1.5; color: #333; padding: 0 12px; min-height: 56px; }
  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }

  .el { opacity: 0; transition: opacity 0.35s ease; }
  .el.show { opacity: 1; }

  .box { fill: #fff; stroke: #1a1a1a; stroke-width: 2.5; }
  .box-finale { fill: #1a1a1a; stroke: #1a1a1a; stroke-width: 2.5; }
  .line { fill: none; stroke: #1a1a1a; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .arrow { fill: #1a1a1a; }
  .head-xl { font-size: 30px; font-weight: 700; fill: #1a1a1a; letter-spacing: 1px; }
  .head-l { font-size: 24px; font-weight: 700; fill: #1a1a1a; }
  .head-l-white { font-size: 24px; font-weight: 700; fill: #fff; }
  .label-b { font-size: 16px; font-weight: 400; fill: #1a1a1a; }
  .label-b-white { font-size: 16px; font-weight: 400; fill: #fff; }
  .label-edge { font-size: 14px; font-weight: 500; fill: #555; font-style: italic; }
  .label-sm { font-size: 13px; font-weight: 400; fill: #666; }
  .badge { fill: #fde68a; stroke: #92400e; stroke-width: 2; }
  .badge-text { font-size: 15px; font-weight: 600; fill: #1a1a1a; }
</style>
</head>
<body>
<div class="stage">
  <div class="frame-wrap" id="frame">
    <div class="title-screen" id="titleScreen">
      Dream Big,<br/>Build Small
      <span class="sub">Backwards Design · The Build Room</span>
    </div>
    <svg id="diagram" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet" style="display:none">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" class="arrow"/>
        </marker>
      </defs>

      <!-- ===== STEP 2: DREAM box (large, top) ===== -->
      <g class="el" data-step="2">
        <rect x="150" y="30" width="800" height="180" rx="14" class="box"/>
        <text x="550" y="78" text-anchor="middle" class="head-xl">DREAM</text>
        <text x="550" y="108" text-anchor="middle" class="label-edge">what do you really want?</text>
      </g>

      <!-- ===== STEP 3: Dream examples inside ===== -->
      <g class="el" data-step="3">
        <text x="200" y="148" class="label-b">• An AI assistant that runs my whole inbox</text>
        <text x="200" y="175" class="label-b">• A product that automatically writes great guest posts in our brand voice</text>
        <text x="200" y="200" class="label-b">• A virtual COO that flags deadlines in WhatsApp</text>
      </g>

      <!-- ===== STEP 4: Arrow down + "backwards design" label ===== -->
      <g class="el" data-step="4">
        <path d="M 550 220 L 550 280" class="line" marker-end="url(#arrow)"/>
        <text x="585" y="258" class="label-edge">we work backwards</text>
      </g>

      <!-- ===== STEP 5: MVP box (medium) ===== -->
      <g class="el" data-step="5">
        <rect x="270" y="285" width="560" height="140" rx="12" class="box"/>
        <text x="550" y="325" text-anchor="middle" class="head-l">MVP</text>
        <text x="550" y="352" text-anchor="middle" class="label-edge">smallest version that proves it can work</text>
        <text x="300" y="388" class="label-b">e.g. one email category, one client, one brand voice, one user.</text>
      </g>

      <!-- ===== STEP 6: Arrow down + FIRST BRICK box ===== -->
      <g class="el" data-step="6">
        <path d="M 550 435 L 550 490" class="line" marker-end="url(#arrow)"/>

        <rect x="350" y="495" width="400" height="140" rx="12" class="box-finale"/>
        <text x="550" y="535" text-anchor="middle" class="head-l-white">FIRST BRICK</text>
        <text x="550" y="563" text-anchor="middle" class="label-b-white" style="font-style:italic;fill:#bbb">smallest component you can build TODAY</text>
        <text x="550" y="600" text-anchor="middle" class="label-b-white">One end-to-end slice. One connection. One output.</text>
      </g>

      <!-- ===== STEP 7: 4-hour badge ===== -->
      <g class="el" data-step="7">
        <rect x="760" y="525" width="200" height="50" rx="25" class="badge"/>
        <text x="860" y="557" text-anchor="middle" class="badge-text">~4 hours of building</text>
        <path d="M 755 550 L 740 550" class="line"/>
      </g>

      <!-- ===== STEP 8: Closing tagline ===== -->
      <g class="el" data-step="8">
        <text x="550" y="680" text-anchor="middle" style="font-size:18px;font-weight:600;fill:#1a1a1a">Same approach when prompting AI. Planning is half the work.</text>
      </g>
    </svg>
  </div>

  <div class="caption" id="caption"></div>
  <div class="hud">
    <div class="controls">
      <button id="prev">← Prev</button>
      <button id="next">Next →</button>
    </div>
    <div><strong id="counter">1</strong> / <span id="total">8</span></div>
  </div>
</div>
<div class="hint">← → arrow keys also work</div>

<script>
const captions = [
  "Dream big, build small. This is how we approach every project.",
  "Start with the dream. What do you really want? Don't filter yet.",
  "A few real dreams. Big, ambitious, useful. The dream is where the energy is.",
  "Then we work backwards. We don't try to build the whole dream today. We design backwards from it.",
  "First stop: the MVP. The smallest version that proves the idea can work. One user. One slice. Real output.",
  "Then the FIRST BRICK. The smallest component you can build TODAY. One connection. One output. End to end.",
  "Roughly 4 hours of building. That's our scope. Anything bigger gets cut. Anything smaller doesn't prove anything.",
  "Same approach when you prompt AI. Tell it your dream. Then plan the smallest piece. Then build the fastest prototype. Planning is half the work."
];

let i = 0;
const titleScreen = document.getElementById("titleScreen");
const diagram = document.getElementById("diagram");
const cap = document.getElementById("caption");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = captions.length;

function render() {
  cap.textContent = captions[i];
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === captions.length - 1;

  if (i === 0) {
    titleScreen.style.display = '';
    diagram.style.display = 'none';
  } else {
    titleScreen.style.display = 'none';
    diagram.style.display = '';
    document.querySelectorAll('#diagram .el').forEach(el => {
      const step = parseInt(el.dataset.step);
      el.classList.toggle('show', step <= i + 1);
    });
  }
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < captions.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

render();
</script>
</body>
</html>
