<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GHL Starter Pack — The Build Room</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 16px; }
  .slide-wrap { flex: 1; max-height: 82vh; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: center; padding: 32px 32px 96px; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 12px; font-weight: 700; color: #999; letter-spacing: 2px; text-transform: uppercase; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: 62px; font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 18px; }
  h2 { font-size: 34px; font-weight: 700; line-height: 1.15; margin-bottom: 22px; letter-spacing: -0.5px; }
  h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #444; }
  p, li { font-size: 18px; line-height: 1.55; color: #333; }
  p + p { margin-top: 12px; }
  ul, ol { padding-left: 24px; }
  ul li, ol li { margin-bottom: 6px; }

  .step-row { display: grid; grid-template-columns: 60px 1fr; gap: 22px; align-items: start; margin-bottom: 18px; }
  .step-num { font-size: 44px; font-weight: 800; line-height: 1; color: #1a1a1a; }
  .step-body strong { font-size: 22px; display: block; margin-bottom: 6px; }
  .step-body p { font-size: 16px; color: #444; }

  .code { background: #1e1e1e; color: #e5e7eb; border-radius: 10px; padding: 18px 22px; font-family: "SF Mono", Consolas, "Courier New", monospace; font-size: 14px; line-height: 1.65; white-space: pre; overflow: auto; max-width: 100%; }
  .code .c { color: #6b9955; }
  .code .k { color: #9cdcfe; }
  .code .s { color: #ce9178; }
  .code .v { color: #569cd6; }

  .gotcha { background: #fde68a; border-left: 6px solid #92400e; padding: 18px 22px; border-radius: 8px; max-width: 820px; }
  .gotcha strong { color: #92400e; font-weight: 800; display: block; font-size: 18px; margin-bottom: 6px; }
  .gotcha p { color: #422510; font-size: 16px; }

  .endpoint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 880px; }
  .endpoint { background: #fff; border: 2px solid #1a1a1a; border-radius: 10px; padding: 16px 18px; }
  .endpoint .path { font-family: "SF Mono", Consolas, monospace; font-size: 14px; font-weight: 700; color: #1a1a1a; display: block; margin-bottom: 4px; }
  .endpoint .what { font-size: 13px; color: #555; }

  .three-stack { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .three-stack .word { font-size: 64px; font-weight: 800; letter-spacing: -2px; line-height: 1; }

  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(250,250,250,0.95); backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 30px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 1000; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; touch-action: manipulation; position: relative; z-index: 1001; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 8px; right: 12px; opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-wrap" id="slideWrap"></div>
  <div class="hud">
    <div class="controls">
      <button id="prev">← Prev</button>
      <button id="next">Next →</button>
    </div>
    <div><strong id="counter">1</strong> / <span id="total">7</span></div>
  </div>
</div>
<div class="hint">← → arrow keys, swipe on mobile</div>
<script>
const slides = [
  {
    html: `<div class="slide center">
      <h1>GHL Starter Pack</h1>
      <p style="font-size:22px;color:#666;max-width:760px">Connect Codex (or any AI agent) to GoHighLevel. Four steps. One trap that bites everyone.</p>
    </div>`
  },
  {
    html: `<div class="slide">
      <div class="section-chip">The Model</div>
      <h2 style="margin-top:30px">Every AI agent talks to GHL the same way</h2>
      <p style="max-width:820px">GHL has no special integration with Claude, Codex, or anything else. It's a REST API. You get a token. You send HTTP requests. You read JSON back.</p>
      <p style="max-width:820px;margin-top:14px"><strong>Base URL:</strong> <code style="background:#eee;padding:2px 8px;border-radius:4px;font-family:'SF Mono',Consolas,monospace">https://services.leadconnectorhq.com/</code></p>
      <p style="max-width:820px;margin-top:14px;color:#666;font-size:16px">If you can read this slide, you have the conceptual model. The next four slides are the actual moves.</p>
    </div>`
  },
  {
    html: `<div class="slide">
      <div class="section-chip">Step 1 of 4</div>
      <h2 style="margin-top:30px">Generate a Private Integration token</h2>
      <div class="step-row">
        <div class="step-num">1</div>
        <div class="step-body">
          <strong>In GHL: Settings → Integrations → Private Integrations</strong>
          <p>Click "Create New Integration." Give it a name (e.g. "Codex Build"). Select the scopes you need (start with Contacts, Opportunities, Conversations). Save.</p>
          <p style="margin-top:10px">Copy the token immediately. GHL only shows it once.</p>
        </div>
      </div>
      <p style="margin-top:18px;color:#666;font-size:15px;max-width:820px">Use Private Integrations, not the legacy API key. The legacy key works but is being deprecated. Private Integrations are scoped per sub-account, which is what you want.</p>
    </div>`
  },
  {
    html: `<div class="slide">
      <div class="section-chip">Step 2 of 4</div>
      <h2 style="margin-top:30px">Drop it in <code style="background:#eee;padding:2px 8px;border-radius:4px;font-family:'SF Mono',Consolas,monospace">.env</code></h2>
      <div class="code" style="max-width:820px"><span class="c"># .env — sits next to your Codex project</span>
<span class="k">GHL_API_KEY</span>=<span class="s">pit-abc123...your-token-here...</span>
<span class="k">GHL_LOCATION_ID</span>=<span class="s">your-sub-account-id</span></div>
      <p style="margin-top:18px;color:#666;font-size:15px;max-width:820px">Add <code style="background:#eee;padding:1px 6px;border-radius:3px;font-family:'SF Mono',Consolas,monospace">.env</code> to your <code style="background:#eee;padding:1px 6px;border-radius:3px;font-family:'SF Mono',Consolas,monospace">.gitignore</code>. Never commit the token. Codex will load it via your shell or a dotenv library.</p>
    </div>`
  },
  {
    html: `<div class="slide">
      <div class="section-chip">Step 3 of 4 · The trap</div>
      <h2 style="margin-top:30px">Make the call</h2>
      <div class="code" style="max-width:880px"><span class="c"># Always include the Version header. This is the trap.</span>
curl https://services.leadconnectorhq.com/contacts/ \\
  -H <span class="s">"Authorization: Bearer $GHL_API_KEY"</span> \\
  -H <span class="s">"Version: 2021-07-28"</span> \\
  -H <span class="s">"Accept: application/json"</span></div>
      <div class="gotcha" style="margin-top:22px">
        <strong>The Version header trap</strong>
        <p>GHL v2 requires <code style="background:#fff7cc;padding:1px 6px;border-radius:3px;font-family:'SF Mono',Consolas,monospace">Version: 2021-07-28</code> on every request. Without it you get a 401 with a confusing error. Tell Codex this once and have it bake the header into every request.</p>
      </div>
    </div>`
  },
  {
    html: `<div class="slide">
      <div class="section-chip">Step 4 of 4</div>
      <h2 style="margin-top:30px">Endpoints to start with</h2>
      <div class="endpoint-grid">
        <div class="endpoint">
          <span class="path">GET /contacts/</span>
          <span class="what">List, search, filter. Where most builds start.</span>
        </div>
        <div class="endpoint">
          <span class="path">POST /contacts/</span>
          <span class="what">Create a contact. Trigger workflows from outside GHL.</span>
        </div>
        <div class="endpoint">
          <span class="path">GET /opportunities/</span>
          <span class="what">Pipeline state. Status changes, owner, value.</span>
        </div>
        <div class="endpoint">
          <span class="path">GET /calendars/events/</span>
          <span class="what">Bookings, appointments. Maria's automation territory.</span>
        </div>
        <div class="endpoint">
          <span class="path">GET /conversations/</span>
          <span class="what">SMS + email threads. Pull, summarize, classify.</span>
        </div>
        <div class="endpoint">
          <span class="path">POST /conversations/messages/</span>
          <span class="what">Send a message back into a thread.</span>
        </div>
      </div>
      <p style="margin-top:16px;color:#666;font-size:14px;max-width:820px">Full docs: <code style="background:#eee;padding:1px 6px;border-radius:3px;font-family:'SF Mono',Consolas,monospace">highlevel.stoplight.io</code>. Don't read all of them. Find the endpoint for your one project, build that.</p>
    </div>`
  },
  {
    html: `<div class="slide center">
      <h2 style="margin-bottom:30px">The Codex prompt</h2>
      <div class="code" style="max-width:820px;text-align:left">Read .env for GHL_API_KEY. Use the GHL v2 API
at services.leadconnectorhq.com. Always send the
Version: 2021-07-28 header.

Pull all contacts tagged "vip" updated in the last
7 days. Print name, phone, last activity date.</div>
      <p style="margin-top:26px;font-size:18px;color:#444;max-width:780px">Paste a prompt like that into Codex. It writes the script. You read the output. That's the loop.</p>
      <div class="three-stack" style="margin-top:38px">
        <div class="word">Learn AI.</div>
        <div class="word">Build Robots.</div>
        <div class="word">Stay Human.</div>
      </div>
    </div>`
  }
];

const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
let i = 0;
total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === slides.length - 1;
}
prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < slides.length - 1) { i++; render(); } };
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next.click(); }
  if (e.key === "ArrowLeft") { e.preventDefault(); prev.click(); }
});
let touchStartX = 0;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
document.addEventListener("touchend", (e) => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) next.click();
    else prev.click();
  }
}, {passive: true});
render();
</script>
</body>
</html>
