<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px; gap: 14px; }
  .slide-wrap { flex: 1; max-height: 82vh; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 11px; font-weight: 700; color: #999; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: 56px; font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 16px; }
  h1.huge { font-size: 72px; }
  h1.mega { font-size: 100px; }
  h2 { font-size: 34px; font-weight: 700; line-height: 1.15; margin-bottom: 22px; letter-spacing: -0.5px; }
  h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #444; }
  p { font-size: 19px; line-height: 1.55; color: #333; margin-bottom: 14px; }
  p.lead { font-size: 23px; color: #1a1a1a; }
  .sub { font-size: 18px; color: #666; font-weight: 400; margin-top: 14px; }

  ul { list-style: none; padding: 0; }
  ul li { font-size: 19px; line-height: 1.6; color: #333; padding-left: 28px; position: relative; margin-bottom: 8px; }
  ul li::before { content: "→"; position: absolute; left: 0; color: #1a1a1a; font-weight: 700; }

  .three-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 22px 0; }
  .three-stack .word { font-size: 60px; font-weight: 800; letter-spacing: -2px; line-height: 1; }

  .three-products { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin: 24px 0; }
  @media (max-width: 720px) { .three-products { grid-template-columns: 1fr; } }
  .product-card { border: 2.5px solid #1a1a1a; border-radius: 12px; padding: 22px 20px; background: #fff; }
  .product-card .tag { font-size: 11px; color: #888; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 6px; }
  .product-card .who { font-size: 11px; color: #16a34a; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .product-card .name { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .product-card .desc { font-size: 14px; line-height: 1.5; color: #444; }

  .gift-hero { background: #fff; border: 3px solid #92400e; border-radius: 18px; padding: 36px 42px; max-width: 760px; text-align: left; position: relative; }
  .gift-hero .ribbon { position: absolute; top: -16px; left: 24px; background: #fde68a; color: #92400e; font-weight: 800; letter-spacing: 2px; font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 2px solid #92400e; }
  .gift-hero h2 { font-size: 34px; margin-bottom: 14px; }
  .gift-hero p { font-size: 17px; color: #444; margin: 0; }

  .arc { display: flex; gap: 12px; margin: 22px 0; justify-content: center; }
  .arc-step { flex: 1; max-width: 200px; border: 2.5px solid #1a1a1a; border-radius: 10px; padding: 16px 12px; }
  .arc-step .num { font-size: 12px; font-weight: 700; color: #666; letter-spacing: 1.5px; }
  .arc-step .title { font-size: 15px; font-weight: 700; margin-top: 6px; line-height: 1.2; }
  .arc-step.finale { background: #1a1a1a; color: #fff; }
  .arc-step.finale .num { color: #999; }
  @media (max-width: 720px) { .arc { flex-direction: column; } .arc-step { max-width: none; } }

  .agenda-list { display: flex; flex-direction: column; gap: 10px; max-width: 580px; margin: 24px auto 0; }
  .agenda-item { display: flex; align-items: center; gap: 16px; padding: 14px 22px; background: #fff; border: 2px solid #1a1a1a; border-radius: 10px; }
  .agenda-item .num { font-size: 14px; font-weight: 800; color: #888; min-width: 28px; letter-spacing: 1px; }
  .agenda-item .label { font-size: 19px; font-weight: 700; }

  .goal-card .num { font-size: 12px; color: #888; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px; }
  .goal-card .label { font-size: 22px; font-weight: 800; line-height: 1.25; }

  .agreement-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 14px; }
  .agreement { background: #1a1a1a; color: #fff; border-radius: 12px; padding: 18px 24px; }
  .agreement .name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .agreement ul li { color: #eee; font-size: 16px; padding: 3px 0 3px 22px; }

  .gundam { font-size: 28px; line-height: 1.4; max-width: 800px; text-align: center; }
  .gundam strong { font-weight: 800; }
  .punch { font-size: 36px; font-weight: 800; margin-top: 16px; }

  .ex-card { background: #fff; border: 2px solid #1a1a1a; border-radius: 10px; padding: 14px 18px; }
  .ex-card strong { display: block; font-size: 16px; margin-bottom: 4px; }

  .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
  @media (max-width: 720px) { .schedule-grid { grid-template-columns: 1fr; } }
  .schedule-card { border: 2.5px solid #1a1a1a; border-radius: 12px; padding: 32px 24px; background: #fff; text-align: center; }
  .schedule-card .tag { font-size: 11px; color: #888; letter-spacing: 2px; font-weight: 700; margin-bottom: 12px; }
  .schedule-card .day { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .schedule-card .time { font-size: 22px; font-weight: 600; color: #555; }

  .commit-card { background: #1a1a1a; color: #fff; border-radius: 14px; padding: 32px 38px; max-width: 720px; text-align: center; }
  .commit-card .label { font-size: 12px; color: #999; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px; }
  .commit-card .big { font-size: 48px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
  .commit-card .small { font-size: 17px; color: #ccc; line-height: 1.5; }

  .urgency-card { background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%); border: 3px solid #92400e; border-radius: 18px; padding: 36px 40px; max-width: 800px; text-align: center; }
  .urgency-card .tag { font-size: 14px; color: #92400e; letter-spacing: 2px; font-weight: 800; margin-bottom: 12px; }
  .urgency-card h2 { font-size: 38px; color: #1a1a1a; margin-bottom: 14px; line-height: 1.15; }
  .urgency-card p { font-size: 18px; color: #1a1a1a; line-height: 1.55; margin: 0 0 14px; }
  .urgency-card .reward { background: #1a1a1a; color: #fde68a; padding: 16px 22px; border-radius: 10px; font-weight: 700; font-size: 17px; display: inline-block; margin-top: 8px; }

  .walkaway-list { max-width: 680px; margin: 18px auto 0; text-align: left; }
  .walkaway-list li { font-size: 22px; margin-bottom: 14px; padding-left: 32px; }

  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; touch-action: manipulation; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 8px; right: 12px; opacity: 0.5; font-size: 11px; }

  @media (max-width: 720px) {
    h1 { font-size: 38px; }
    h1.huge { font-size: 46px; }
    h1.mega { font-size: 64px; }

</style>
</head>

  next.disabled = i === slides.length - 1;
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < slides.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

let touchStartX = 0;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
document.addEventListener("touchend", (e) => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) next.click();
    else prev.click();
  }
}, {passive: true});

render();
</script>
</body>
</html>
