  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }

  .hint { position: fixed; bottom: 8px; right: 12px; opacity: 0.5; font-size: 11px; }

  @media (max-width: 720px) {

</style>

let i = 0;
let revealIdx = 0; // sub-step within current slide
const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = false; // we manage at the click level

  // Reset reveal state for any slide that uses it
  revealIdx = 0;
  applyReveals();
}

function applyReveals() {
  const cards = document.querySelectorAll('.ex-card[data-reveal]');
  cards.forEach(c => {
    const r = parseInt(c.dataset.reveal);
    c.classList.toggle('revealed', r < revealIdx);
  });
}

function goNext() {
  const reveals = slides[i].reveals || 0;
  if (reveals > 0 && revealIdx < reveals) {
    revealIdx++;
    applyReveals();
    return;
  }
  if (i < slides.length - 1) { i++; render(); }
}

function goPrev() {
  // On reveal-slides, if we have any revealed, walk back through them first
  const reveals = slides[i].reveals || 0;
  if (reveals > 0 && revealIdx > 0) {
    revealIdx--;
    applyReveals();
    return;
  }
  if (i > 0) { i--; render(); }
}

prev.onclick = goPrev;
next.onclick = goNext;

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); goNext(); }
  if (e.key === "ArrowLeft") { e.preventDefault(); goPrev(); }
});

let touchStartX = 0;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
document.addEventListener("touchend", (e) => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) goNext();
    else goPrev();
  }
}, {passive: true});

render();
</script>
