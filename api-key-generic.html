  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }

  .scene { display: none; }
  .scene.active { display: block; }

  .box { fill: #fff; stroke: #1a1a1a; stroke-width: 2.5; }
  .box-dark { fill: #1e1e1e; stroke: #1e1e1e; stroke-width: 2; }
  .box-soft { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1.5; }
  .box-finale { fill: #1a1a1a; stroke: #1a1a1a; stroke-width: 2.5; }
  .line { fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .line-thin { fill: none; stroke: #d1d5db; stroke-width: 1.5; }
  .highlight { fill: #fde68a; stroke: #92400e; stroke-width: 2.5; }
  .highlight-soft { fill: #fde68a; opacity: 0.55; stroke: #92400e; stroke-width: 2; }

  .nav-brand { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
  .nav-item { font-size: 14px; font-weight: 500; fill: #555; }
  .page-h { font-size: 24px; font-weight: 700; fill: #1a1a1a; }

<div class="hint">← → arrow keys also work</div>

<script>
const captions = [
  "How to find an API key, store it, and hand it to your AI assistant.",
  "Step one. You're logged into the tool. Here it's Hubly, but it's the same shape everywhere. Click your avatar, top right.",
  "A menu opens. Click Settings. Almost every web app puts API access behind Settings.",
  "In Settings, find a tab called Developer, API, or sometimes Personal Access Tokens. Click it.",
  "This is the page you came for. Click Generate new token.",
  "Name your token after where you'll use it. Pick read-only permissions if you only need to look at data. Click Generate.",
  "The tool shows you the token once. Copy it now. After you close this page it's gone, and you have to make a new one.",
  "Open a file called .env in your project folder. Paste the token in. One line: the name, an equals sign, the value. Save.",
  "Now tell your AI assistant the key is in your .env file. It reads it from disk, calls the tool, and does the work. You never paste the token in chat."
];

let i = 0;
const titleScreen = document.getElementById("titleScreen");
const scenes = document.querySelectorAll(".scene");
const cap = document.getElementById("caption");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = captions.length;

function render() {
  cap.textContent = captions[i];
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === captions.length - 1;

  if (i === 0) {
    titleScreen.style.display = '';
    scenes.forEach(s => s.classList.remove('active'));
  } else {
    titleScreen.style.display = 'none';
    scenes.forEach(s => {
      const step = parseInt(s.dataset.scene);
      s.classList.toggle('active', step === i + 1);
    });
  }
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < captions.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

render();
</script>
