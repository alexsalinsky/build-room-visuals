<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Build Room — Cohort Kick-off</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 16px; }
  .slide-wrap { flex: 1; max-height: 82vh; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: center; padding: 32px; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 12px; font-weight: 700; color: #999; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .section-chip .timer { background: #1a1a1a; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; letter-spacing: 1px; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: 68px; font-weight: 800; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 18px; }
  h1.small { font-size: 48px; }
  h2 { font-size: 36px; font-weight: 700; line-height: 1.15; margin-bottom: 24px; letter-spacing: -0.5px; }
  h3 { font-size: 22px; font-weight: 600; margin-bottom: 14px; color: #444; }
  p { font-size: 20px; line-height: 1.55; color: #333; margin-bottom: 14px; }
  p.lead { font-size: 26px; color: #1a1a1a; }
  .sub { font-size: 20px; color: #666; font-weight: 400; margin-top: 14px; }

  ul { list-style: none; padding: 0; }
  ul li { font-size: 20px; line-height: 1.6; color: #333; padding-left: 28px; position: relative; margin-bottom: 8px; }
  ul li::before { content: "→"; position: absolute; left: 0; color: #1a1a1a; font-weight: 700; }

  .three-words { display: flex; gap: 40px; justify-content: center; align-items: baseline; margin: 30px 0; flex-wrap: wrap; }
  .three-words .word { font-size: 68px; font-weight: 800; letter-spacing: -2px; }
  .three-words .dot { font-size: 50px; color: #999; }

  .arc { display: flex; gap: 16px; margin: 28px 0; justify-content: center; }
  .arc-step { flex: 1; max-width: 220px; border: 2.5px solid #1a1a1a; border-radius: 10px; padding: 20px 16px; }
  .arc-step .num { font-size: 14px; font-weight: 700; color: #666; letter-spacing: 1.5px; }
  .arc-step .title { font-size: 18px; font-weight: 700; margin-top: 6px; line-height: 1.2; }
  .arc-step.finale { background: #1a1a1a; color: #fff; }
  .arc-step.finale .num { color: #999; }

  .quote { background: #fff; border-left: 4px solid #1a1a1a; padding: 16px 22px; margin: 10px 0; font-size: 18px; font-style: italic; color: #222; }

  .rule { background: #1a1a1a; color: #fff; padding: 26px 32px; border-radius: 12px; margin-bottom: 14px; font-size: 22px; font-weight: 600; }

  .gundam { font-size: 30px; line-height: 1.4; max-width: 800px; text-align: center; }
  .gundam strong { font-weight: 700; }
  .gundam .punch { font-size: 36px; font-weight: 800; margin-top: 20px; }

  .prize-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 20px 0; }
  .prize-card { border: 2.5px solid #1a1a1a; border-radius: 12px; padding: 30px 26px; text-align: center; background: #fff; }
  .prize-card h3 { font-size: 16px; color: #888; letter-spacing: 2px; margin-bottom: 12px; }
  .prize-card .name { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
  .prize-card .desc { font-size: 16px; color: #555; }
  .prize-reward { background: #1a1a1a; color: #fff; padding: 18px 26px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: 600; margin-top: 18px; }
  .prize-reward span { color: #aaa; font-weight: 400; font-size: 15px; display: block; margin-top: 4px; }

  .async-row { display: flex; gap: 20px; margin-bottom: 16px; align-items: flex-start; padding: 16px 20px; background: #fff; border: 1.5px solid #1a1a1a; border-radius: 10px; }
  .async-icon { font-size: 28px; min-width: 50px; }
  .async-body strong { font-size: 19px; display: block; margin-bottom: 4px; }
  .async-body { font-size: 16px; color: #444; line-height: 1.5; }

  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }
</style>
</head>
<body>
<div class="stage">
  <div class="slide-wrap" id="slideWrap"></div>
  <div class="hud">
    <div class="controls">
      <button id="prev">← Prev</button>
      <button id="next">Next →</button>
    </div>
    <div><strong id="counter">1</strong> / <span id="total">12</span></div>
  </div>
</div>
<div class="hint">← → arrow keys also work</div>

<script>
const slides = [
  // ============ SECTION 1: MISSION ENROLLMENT ============

  // 1. Title
  {
    html: `<div class="slide center">
      <h1>The Build Room</h1>
      <p class="lead" style="font-size:30px;color:#666;font-weight:400">Cohort</p>
    </div>`
  },

  // 2. The Promise
  {
    html: `<div class="slide center">
      <div class="section-chip">Mission Enrollment</div>
      <h2>Over the next 4 weeks</h2>
      <p class="lead" style="font-size:32px;max-width:850px;line-height:1.4">Each of you ships <strong>one AI tool</strong> that supports you in your role.</p>
    </div>`
  },

  // 3. Humans V Robots
  {
    html: `<div class="slide center">
      <div class="section-chip">Mission Enrollment</div>
      <h2>Humans V Robots</h2>
      <p class="gundam">AI is the <strong>tool</strong>.<br/>You are the <strong>builder</strong>.</p>
      <p class="gundam" style="margin-top:18px;font-size:22px;color:#555;max-width:760px">Most people will let the robot drive. This cohort builds the muscle to stay in the cockpit. The wins go to the humans who can think, decide, and ship.</p>
      <p class="punch" style="margin-top:24px;font-size:32px;font-weight:800">Team Human.</p>
    </div>`
  },

  // 4. What's possible (Inspiration)
  {
    html: `<div class="slide">
      <div class="section-chip">Mission Enrollment</div>
      <h2 style="margin-top:30px">What's possible</h2>
      <p style="font-size:18px;color:#666;margin-bottom:22px">Three things I've built with AI. Personal, internal operations, external product.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px">
        <div style="border:2.5px solid #1a1a1a;border-radius:12px;padding:22px 20px;background:#fff">
          <div style="font-size:13px;color:#888;letter-spacing:1.5px;font-weight:700;margin-bottom:8px">PERSONAL</div>
          <div style="font-size:22px;font-weight:800;margin-bottom:10px">EA-OS</div>
          <div style="font-size:15px;line-height:1.5;color:#444">A personal AI brain. Reads my calendar, manages my tasks, sends a WhatsApp briefing every morning. Tracks my goals and follow-ups so I don't drop them.</div>
        </div>
        <div style="border:2.5px solid #1a1a1a;border-radius:12px;padding:22px 20px;background:#fff">
          <div style="font-size:13px;color:#888;letter-spacing:1.5px;font-weight:700;margin-bottom:8px">INTERNAL OPERATIONS</div>
          <div style="font-size:22px;font-weight:800;margin-bottom:10px">Daybreak</div>

    </div>`

  // 5. State of the Org (placeholder: open the cohort's pie page in another tab)
  {
    html: `<div class="slide center">
      <div class="section-chip">Mission Enrollment</div>
      <h2 style="margin-top:20px">Where you are right now</h2>
      <p style="font-size:18px;color:#666;margin-bottom:26px;max-width:760px">Based on what you told us in the survey.</p>
      <div style="background:#fff;border:2.5px dashed #1a1a1a;border-radius:14px;padding:36px 44px;max-width:780px">
        <div style="font-size:12px;font-weight:700;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px">OPEN IN ANOTHER TAB</div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px">Your Org's Adoption Snapshot</div>
        <div style="font-size:16px;color:#555;line-height:1.5;margin-bottom:18px">Pie chart of where the team falls across the four levels: Exploring, Adopting, Operating, Multiplying.</div>
        <div style="font-size:13px;color:#888;font-style:italic">Pre-cohort: use the Pie Generator. Open the resulting page in a separate tab. Walk it. Come back here.</div>
      </div>
      <div style="background:#1a1a1a;color:#fff;padding:18px 26px;border-radius:12px;font-size:19px;font-weight:600;text-align:center;margin-top:22px;max-width:780px">Strong foundation. The goal: bump everyone up to the next level.</div>
    </div>`
  },

  // 6. Fears (placeholder: open the cohort's fears page in another tab)
  {
    html: `<div class="slide center">
      <div class="section-chip">Mission Enrollment</div>
      <h2 style="margin-top:20px">Your fears. Said out loud.</h2>
      <p style="font-size:18px;color:#666;margin-bottom:26px;max-width:760px">From the survey. Real things you wrote.</p>
      <div style="background:#fff;border:2.5px dashed #1a1a1a;border-radius:14px;padding:36px 44px;max-width:780px">
        <div style="font-size:12px;font-weight:700;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px">OPEN IN ANOTHER TAB</div>
        <div style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px">Your Cohort's Fears</div>
        <div style="font-size:16px;color:#555;line-height:1.5;margin-bottom:18px">3-4 anonymized quotes from the cohort's pre-survey. The ones that landed the hardest. Worth naming so we can work with them, not pretend they're not there.</div>
        <div style="font-size:13px;color:#888;font-style:italic">Pre-cohort: pull the sharpest 3-4 quotes from the "biggest worry" responses. Anonymize. Drop into a fears page. Open in a separate tab when this slide hits.</div>
      </div>
    </div>`
  },

  // ============ SECTION 2: OBJECTIVES ============

  // 5. Three objectives (stacked)
  {
    html: `<div class="slide center">
      <div class="section-chip">Objectives</div>
      <h3 style="color:#888;letter-spacing:3px;font-size:16px;margin-bottom:30px;margin-top:30px">THE MISSION</h3>
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <div style="font-size:80px;font-weight:800;letter-spacing:-2px;line-height:1">Learn AI</div>
        <div style="font-size:80px;font-weight:800;letter-spacing:-2px;line-height:1">Build Robots</div>
        <div style="font-size:80px;font-weight:800;letter-spacing:-2px;line-height:1">Stay Human</div>
      </div>
    </div>`
  },

  // ============ SECTION 3: AGREEMENTS ============

  // 6. Agreements
  {
    html: `<div class="slide">
      <div class="section-chip">Agreements</div>
      <h2 style="margin-top:30px">Agreements</h2>
      <div style="display:flex;flex-direction:column;gap:18px;margin-top:10px">
        <div style="background:#1a1a1a;color:#fff;border-radius:12px;padding:22px 28px">
          <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px">Presence</div>
          <ul style="list-style:none;padding:0">
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ Show up on time</li>
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ With full presence</li>
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ In a place you can talk, engage, work, and not be distracted for the full session</li>
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ Cameras on</li>
          </ul>
        </div>
        <div style="background:#1a1a1a;color:#fff;border-radius:12px;padding:22px 28px">
          <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px">Teamwork</div>
          <ul style="list-style:none;padding:0">
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ We share doubt</li>
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ And we help each other out</li>
          </ul>
        </div>
        <div style="background:#1a1a1a;color:#fff;border-radius:12px;padding:22px 28px">
          <div style="font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px">Positive Possibility</div>
          <ul style="list-style:none;padding:0">
            <li style="color:#eee;font-size:17px;padding:4px 0 4px 22px;position:relative">→ I am open to the positive possibility that I can learn, build, and stay human in the process</li>
          </ul>
        </div>
      </div>
    </div>`
  },

  // ============ SECTION 4: HOUSEKEEPING ============

  // 7. Goals and Demos (the arc)
  {
    html: `<div class="slide center">
      <div class="section-chip">Housekeeping · Goals and Demos</div>
      <h2 style="margin-top:30px">How the 4 weeks go</h2>
      <div class="arc">
        <div class="arc-step"><div class="num">SESSION 1</div><div class="title">Kickoff + start the build</div></div>
        <div class="arc-step"><div class="num">SESSION 2</div><div class="title">Learn + build</div></div>
        <div class="arc-step"><div class="num">SESSION 3</div><div class="title">Learn + build</div></div>
        <div class="arc-step finale"><div class="num">SESSION 4</div><div class="title">Build Day + Demo Day</div></div>
      </div>
      <p style="max-width:820px;font-size:18px;color:#666;margin-top:18px">One session per week. 2 hours each. Same time, same place.</p>
    </div>`
  },

  // 8. Prizes
  {
    html: `<div class="slide">
      <div class="section-chip">Housekeeping · Prizes</div>
      <h2 style="margin-top:30px">Recognition at Demo Day</h2>
      <div class="prize-grid" style="margin-top:24px">
        <div class="prize-card">
          <h3>AWARD #1</h3>
          <div class="name">Most Business Value</div>
          <div class="desc">The build that's already saving real time or making real money.</div>
        </div>
        <div class="prize-card">
          <h3>AWARD #2</h3>
          <div class="name">Coolest Build</div>
          <div class="desc">The build that surprised the room. The one people want to copy.</div>
        </div>
      </div>
    </div>`
  },

  // 9. Async Communication
  {
    html: `<div class="slide">
      <div class="section-chip">Housekeeping · Async Communication</div>
      <h2 style="margin-top:30px">Between sessions</h2>
      <div class="async-row" style="margin-top:14px">
        <div class="async-icon">▣</div>
        <div class="async-body"><strong>Cohort space (Skool / shared)</strong>Post questions, share progress, get unblocked.</div>
      </div>
      <div class="async-row">
        <div class="async-icon">↗</div>
        <div class="async-body"><strong>Share your wins</strong>Screenshot, link, voice note.</div>
      </div>
      <div class="async-row">
        <div class="async-icon">⏱</div>
        <div class="async-body"><strong>Expect coaching, not a help desk</strong>Peers chime in. We grow as a group.</div>
      </div>
    </div>`
  },

  // ============ SECTION 5: EXCITEMENT ============

  // 10. What's next (Excitement chip removed)
  {
    html: `<div class="slide center">
      <h2 style="margin-top:30px">What we do right now</h2>
      <ul style="text-align:left;max-width:680px;margin-top:18px">
        <li><strong>Lesson 1:</strong> What's happening inside the robot</li>
        <li><strong>Lesson 2:</strong> Input · Output · When</li>
        <li><strong>Choose your project</strong></li>
        <li><strong>First build sprint</strong></li>
        <li><strong>Share back + close</strong></li>
      </ul>
      <p style="margin-top:40px;font-size:36px;font-weight:800;color:#1a1a1a">Let's go.</p>
    </div>`
  }
];

let i = 0;
const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === slides.length - 1;
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < slides.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

render();
</script>
</body>
</html>
