<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>From Explorer to Operator — Take the Wheel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 16px; }
  .slide-wrap { flex: 1; max-height: 88vh; width: 100%; max-width: 1100px; display: flex; align-items: center; justify-content: center; padding: 32px 32px 96px; }
  .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative; }
  .slide.center { align-items: center; text-align: center; }

  .section-chip { position: absolute; top: 0; left: 0; font-size: 12px; font-weight: 700; color: #999; letter-spacing: 2px; text-transform: uppercase; }
  .slide.center .section-chip { left: 50%; transform: translateX(-50%); }

  h1 { font-size: 72px; font-weight: 800; line-height: 1.02; letter-spacing: -1.8px; margin-bottom: 18px; }
  h1.small { font-size: 56px; }
  h2 { font-size: 44px; font-weight: 700; line-height: 1.12; margin-bottom: 22px; letter-spacing: -0.6px; }
  h3 { font-size: 24px; font-weight: 600; margin-bottom: 14px; color: #444; letter-spacing: -0.2px; }
  p { font-size: 22px; line-height: 1.55; color: #333; margin-bottom: 14px; }
  p.lead { font-size: 28px; color: #1a1a1a; max-width: 880px; }
  p.huge { font-size: 38px; font-weight: 700; line-height: 1.25; max-width: 900px; }
  .sub { font-size: 20px; color: #666; font-weight: 400; margin-top: 14px; }
  .kicker { font-size: 14px; font-weight: 700; color: #999; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 14px; }

  ul { list-style: none; padding: 0; }
  ul li { font-size: 22px; line-height: 1.6; color: #333; padding-left: 28px; position: relative; margin-bottom: 10px; }
  ul li::before { content: "\2192"; position: absolute; left: 0; color: #1a1a1a; font-weight: 700; }

  .creds { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 36px; max-width: 820px; margin: 16px auto 0; text-align: left; }
  .creds .item { padding: 14px 18px; border-left: 3px solid #1a1a1a; }
  .creds .item .n { font-size: 32px; font-weight: 800; letter-spacing: -1px; display: block; }
  .creds .item .l { font-size: 16px; color: #555; }

  .levels { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin: 24px 0; width: 100%; max-width: 1000px; }
  .level { border: 2.5px solid #1a1a1a; border-radius: 12px; padding: 22px 18px; background: #fff; text-align: left; }
  .level .num { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 1.5px; }
  .level .name { font-size: 26px; font-weight: 800; margin: 8px 0 10px; letter-spacing: -0.5px; }
  .level .def { font-size: 15px; line-height: 1.45; color: #444; }
  .level.focus { background: #1a1a1a; color: #fff; }
  .level.focus .num { color: #999; }
  .level.focus .def { color: #ddd; }

  .q-card { background: #fff; border: 2.5px solid #1a1a1a; border-radius: 14px; padding: 34px 38px; max-width: 880px; width: 100%; }
  .q-card .q-num { font-size: 14px; font-weight: 700; color: #888; letter-spacing: 2px; }
  .q-card h2 { font-size: 38px; margin: 8px 0 24px; }
  .q-card .choices { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .q-card .choice { display: flex; gap: 14px; align-items: baseline; padding: 12px 16px; background: #fafafa; border-radius: 8px; }
  .q-card .choice .n { font-size: 22px; font-weight: 800; color: #1a1a1a; min-width: 28px; }
  .q-card .choice .t { font-size: 18px; color: #333; line-height: 1.45; }

  .pie-wrap { display: flex; gap: 50px; align-items: center; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .pie {
    width: 320px; height: 320px; border-radius: 50%;
    background: conic-gradient(
      #ef4444 0% 35%,
      #f59e0b 35% 80%,
      #84cc16 80% 95%,
      #16a34a 95% 100%
    );

  }
  .pie-legend { display: flex; flex-direction: column; gap: 14px; text-align: left; }
  .legend-row { display: flex; align-items: center; gap: 14px; font-size: 19px; }
  .legend-swatch { width: 24px; height: 24px; border-radius: 4px; }
  .legend-row .lbl { font-weight: 700; min-width: 110px; }
  .legend-row .pct { color: #666; }

  .story { max-width: 880px; text-align: left; font-size: 22px; line-height: 1.55; }
  .story .turn { background: #fff; border-left: 4px solid #1a1a1a; padding: 16px 22px; margin: 14px 0; font-size: 20px; }
  .story .turn .who { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 6px; }

  .rule-block { background: #1a1a1a; color: #fff; padding: 30px 36px; border-radius: 14px; max-width: 820px; }
  .rule-block .small { font-size: 14px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  .rule-block .big { font-size: 30px; line-height: 1.3; font-weight: 700; }

  .takeaways { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 880px; margin: 16px auto 0; }
  .take { background: #fff; border: 2px solid #1a1a1a; border-radius: 12px; padding: 22px 24px; text-align: left; }
  .take .label { font-size: 13px; font-weight: 700; color: #888; letter-spacing: 1.5px; text-transform: uppercase; }
  .take .val { font-size: 22px; font-weight: 700; margin-top: 8px; line-height: 1.3; }

  .ladder { display: flex; flex-direction: column; gap: 10px; max-width: 920px; width: 100%; margin: 14px auto 0; }
  .ladder-row { display: grid; grid-template-columns: 90px 1fr; gap: 22px; align-items: center; padding: 14px 22px; background: #fff; border: 2px solid #1a1a1a; border-radius: 12px; text-align: left; }
  .ladder-row .swatch { width: 70px; height: 70px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 24px; }
  .ladder-row .meta .name { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
  .ladder-row .meta .desc { font-size: 16px; color: #444; line-height: 1.45; margin-top: 4px; }
  .chasm { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 4px 0; padding: 6px 0; font-size: 13px; font-weight: 800; color: #c0392b; letter-spacing: 3px; text-transform: uppercase; }
  .chasm::before, .chasm::after { content: ""; flex: 1; height: 0; border-top: 2px dashed #c0392b; max-width: 220px; }

  .cta { background: #1a1a1a; color: #fff; padding: 42px 48px; border-radius: 16px; max-width: 880px; text-align: center; }
  .cta .thesis { font-size: 44px; font-weight: 800; letter-spacing: -1px; line-height: 1.15; margin: 18px 0 12px; }
  .cta .links { font-size: 18px; color: #ccc; margin-top: 14px; }

  .demo-card { background: #fff; border: 2.5px dashed #1a1a1a; border-radius: 14px; padding: 36px 40px; max-width: 860px; text-align: left; }
  .demo-card .tag { font-size: 14px; font-weight: 800; color: #c8a847; letter-spacing: 2.5px; text-transform: uppercase; }
  .demo-card h2 { font-size: 40px; margin: 8px 0 16px; }
  .demo-card p { font-size: 19px; }

  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(250,250,250,0.95); backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 30px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 1000; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; touch-action: manipulation; position: relative; z-index: 1001; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 8px; right: 12px; opacity: 0.5; font-size: 11px; }
  .footer-stamp { position: fixed; bottom: 8px; left: 12px; opacity: 0.5; font-size: 11px; color: #666; }

  @keyframes popin {
    0%   { opacity: 0; transform: scale(0.4); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  .popin { animation: popin 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  .popin-defer { opacity: 0; }
</style>
</head>

let i = 0;
const wrap = document.getElementById("slideWrap");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = slides.length;

function render() {
  wrap.innerHTML = slides[i].html;
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === slides.length - 1;
}

function tryReveal() {
  const el = wrap.querySelector('.reveal:not(.shown)');
  if (el) {
    el.classList.add('shown');
    el.style.opacity = 1;
    el.style.transform = 'translateY(0)';
    el.querySelectorAll('.popin-defer').forEach(c => {
      c.classList.remove('popin-defer');
      c.classList.add('popin');
    });
    return true;
  }
  return false;
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (tryReveal()) return; if (i < slides.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next.click(); }
  if (e.key === "ArrowLeft") { e.preventDefault(); prev.click(); }
});

let touchStartX = 0;
document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
document.addEventListener("touchend", (e) => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) next.click();
    else prev.click();
  }
}, {passive: true});

render();
</script>
