<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threads burn. Files remain. The Build Room</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fafafa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; overflow: hidden; }
  .stage { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; gap: 12px; }
  .frame-wrap { flex: 1; max-height: 80vh; width: 100%; display: flex; align-items: center; justify-content: center; }
  svg { width: auto; height: auto; max-width: 100%; max-height: 100%; }
  .title-screen { font-size: 60px; font-weight: 700; text-align: center; color: #1a1a1a; letter-spacing: -1px; line-height: 1.1; }
  .title-screen .sub { display: block; font-size: 22px; font-weight: 400; margin-top: 18px; color: #666; letter-spacing: 0; }
  .caption { max-width: 920px; text-align: center; font-size: 18px; line-height: 1.5; color: #333; padding: 0 12px; min-height: 56px; }
  .hud { display: flex; gap: 24px; align-items: center; font-size: 14px; color: #666; }
  .hud strong { color: #1a1a1a; font-size: 16px; }
  .controls { display: flex; gap: 10px; }
  button { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
  button:hover { background: #1a1a1a; color: #fff; }
  button:disabled { opacity: 0.25; cursor: default; }
  button:disabled:hover { background: #fff; color: #1a1a1a; }
  .hint { position: fixed; bottom: 10px; right: 14px; opacity: 0.5; font-size: 12px; }

  .scene { display: none; }
  .scene.active { display: block; }

  .box { fill: #fff; stroke: #1a1a1a; stroke-width: 2.5; }
  .box-soft { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1.5; }
  .box-finale { fill: #1a1a1a; stroke: #1a1a1a; stroke-width: 2.5; }
  .line-thin { fill: none; stroke: #d1d5db; stroke-width: 1.5; }
  .line-mid  { fill: none; stroke: #1a1a1a; stroke-width: 1.5; }
  .highlight { fill: #fde68a; stroke: #92400e; stroke-width: 2.5; }
  .ember     { fill: #fde68a; stroke: #92400e; stroke-width: 2; }
  .bubble-user { fill: #1a1a1a; stroke: #1a1a1a; stroke-width: 2; }
  .bubble-ai   { fill: #fffbe8; stroke: #92400e; stroke-width: 2; }
  .crossed   { stroke: #b91c1c; stroke-width: 4; stroke-linecap: round; }

  .head-xl { font-size: 28px; font-weight: 700; fill: #1a1a1a; letter-spacing: 0.5px; }
  .head-md { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
  .head-md-white { font-size: 18px; font-weight: 700; fill: #fff; }
  .label-b { font-size: 14px; font-weight: 400; fill: #1a1a1a; }
  .label-b-bold { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .label-b-white { font-size: 14px; font-weight: 400; fill: #fff; }
  .label-sm { font-size: 12px; font-weight: 400; fill: #666; }
  .label-sm-white { font-size: 12px; font-weight: 400; fill: #d1d5db; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; font-weight: 500; fill: #1a1a1a; }
  .mono-rule { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; font-weight: 700; fill: #92400e; }
  .label-h-white { font-size: 22px; font-weight: 700; fill: #fff; }
  .label-h-white-sm { font-size: 16px; font-weight: 400; fill: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="frame-wrap" id="frame">

    <div class="title-screen" id="titleScreen">
      Threads burn.<br/>Files remain.
      <span class="sub">The Build Room</span>
    </div>

    <!-- =========== SCENE 2: the chat (what people think building is) =========== -->
    <svg class="scene" data-scene="2" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">"I'm building something with AI."</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">What most people picture.</text>

      <!-- Chat window -->
      <rect x="180" y="110" width="740" height="540" rx="14" class="box"/>
      <rect x="180" y="110" width="740" height="50" rx="14" fill="#f9fafb" stroke="#1a1a1a" stroke-width="2.5"/>
      <circle cx="210" cy="135" r="14" fill="#1a1a1a"/>
      <text x="210" y="140" text-anchor="middle" class="label-b-white" style="font-weight:700">C</text>
      <text x="238" y="132" class="label-b-bold">Codex</text>
      <text x="238" y="150" class="label-sm">your AI build tool</text>

      <!-- user bubble -->
      <rect x="380" y="190" width="510" height="80" rx="14" class="bubble-user"/>
      <text x="405" y="218" class="label-b-white" style="font-weight:600">You</text>
      <text x="405" y="245" class="label-b-white">Help me build the tool we scoped last week.</text>

      <!-- ai bubble -->
      <rect x="210" y="300" width="560" height="100" rx="14" class="bubble-ai"/>
      <text x="235" y="328" class="label-b-bold">Codex</text>
      <text x="235" y="355" class="label-b">Got it. Let's start with the data structure...</text>
      <text x="235" y="378" class="label-b">First I'll set up a project folder.</text>

      <!-- user bubble 2 -->
      <rect x="430" y="430" width="460" height="60" rx="14" class="bubble-user"/>
      <text x="455" y="468" class="label-b-white">Sounds good. Go.</text>

      <!-- ai bubble 2 -->
      <rect x="210" y="520" width="500" height="100" rx="14" class="bubble-ai"/>
      <text x="235" y="548" class="label-b-bold">Codex</text>
      <text x="235" y="575" class="label-b">Working on it. Creating files...</text>
      <text x="235" y="598" class="label-sm" style="font-style:italic">(this is the part people don't see)</text>
    </svg>

    <!-- =========== SCENE 3: the files appear =========== -->
    <svg class="scene" data-scene="3" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">Underneath the chat, files.</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">An app is just files. A website is just files. Your build is too.</text>

      <!-- Chat window shrunk on the left -->
      <rect x="40" y="110" width="380" height="540" rx="12" class="box"/>
      <rect x="40" y="110" width="380" height="42" rx="12" fill="#f9fafb" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="65" cy="131" r="10" fill="#1a1a1a"/>
      <text x="65" y="135" text-anchor="middle" class="label-sm-white" style="font-weight:700;fill:#fff;font-size:11px">C</text>
      <text x="84" y="135" class="label-sm" style="font-weight:600">Codex chat</text>

      <rect x="180" y="180" width="220" height="50" rx="10" class="bubble-user" opacity="0.75"/>
      <text x="195" y="210" class="label-b-white" style="font-size:12px">Help me build it.</text>

      <rect x="60" y="250" width="280" height="60" rx="10" class="bubble-ai" opacity="0.75"/>
      <text x="75" y="278" class="label-sm" style="font-weight:700;fill:#92400e">Codex</text>
      <text x="75" y="296" class="label-sm">Setting up your project folder.</text>

      <rect x="200" y="335" width="200" height="40" rx="10" class="bubble-user" opacity="0.75"/>
      <text x="215" y="360" class="label-b-white" style="font-size:12px">Go.</text>

      <text x="230" y="430" text-anchor="middle" class="label-sm" style="font-style:italic">(meanwhile, on your computer...)</text>

      <!-- Arrow from chat to folder -->
      <path d="M 410 380 Q 470 380 480 290" class="line-mid" fill="none" stroke-dasharray="5 4"/>
      <polygon points="478,278 485,294 472,290" fill="#1a1a1a"/>

      <!-- Folder on the right -->
      <rect x="500" y="110" width="560" height="540" rx="12" class="box"/>
      <rect x="500" y="110" width="560" height="42" rx="12" fill="#f3f4f6" stroke="#1a1a1a" stroke-width="2"/>
      <text x="520" y="135" class="label-sm" style="font-weight:700">~/projects/your-build/</text>

      <!-- Folder tree -->
      <text x="520" y="182" class="mono">📁 your-build/</text>
      <text x="540" y="210" class="mono">📄 PROJECT.md</text>
      <text x="540" y="234" class="mono">📄 ARCHITECTURE.md</text>
      <text x="540" y="258" class="mono">📄 WORKBENCH.md</text>
      <text x="540" y="282" class="mono">📄 USER_GUIDE.md</text>
      <text x="540" y="306" class="mono">📄 TODOS.md</text>
      <text x="540" y="334" class="mono">📁 src/</text>
      <text x="560" y="358" class="mono">📄 main.py</text>
      <text x="560" y="382" class="mono">📄 config.py</text>
      <text x="540" y="410" class="mono">📁 data/</text>
      <text x="560" y="434" class="mono">📄 sample.json</text>
      <text x="540" y="462" class="mono">📁 prompt-journal/</text>
      <text x="560" y="486" class="mono">📄 session-1.md</text>
      <text x="560" y="510" class="mono">📄 session-2.md</text>

      <text x="520" y="568" class="label-sm" style="font-style:italic">Real files. On your computer. Made by Codex while you talked.</text>
      <text x="520" y="592" class="label-sm" style="font-style:italic">Not a chat transcript. A project.</text>
    </svg>

    <!-- =========== SCENE 4: the four rule-pack docs glow =========== -->
    <svg class="scene" data-scene="4" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">Four of them keep the project alive.</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">The rule-pack tells Codex to write these without being asked, every session.</text>

      <!-- Folder window -->
      <rect x="60" y="110" width="500" height="540" rx="12" class="box"/>
      <rect x="60" y="110" width="500" height="42" rx="12" fill="#f3f4f6" stroke="#1a1a1a" stroke-width="2"/>
      <text x="80" y="135" class="label-sm" style="font-weight:700">~/projects/your-build/</text>

      <text x="80" y="182" class="mono">📁 your-build/</text>

      <!-- Glow on the four -->
      <rect x="92" y="195" width="450" height="120" rx="6" class="highlight" opacity="0.6"/>

      <text x="100" y="216" class="mono-rule">📄 ARCHITECTURE.md</text>
      <text x="100" y="240" class="mono-rule">📄 WORKBENCH.md</text>
      <text x="100" y="264" class="mono-rule">📄 USER_GUIDE.md</text>
      <text x="100" y="288" class="mono-rule">📄 TODOS.md</text>

      <text x="100" y="332" class="mono">📄 PROJECT.md</text>
      <text x="100" y="356" class="mono" style="fill:#666">📁 src/</text>
      <text x="100" y="380" class="mono" style="fill:#666">📁 data/</text>
      <text x="100" y="404" class="mono" style="fill:#666">📁 prompt-journal/</text>

      <!-- Explanations on the right -->
      <rect x="600" y="120" width="460" height="540" rx="12" class="box-soft"/>
      <text x="620" y="155" class="head-md">The four living documents</text>
      <line x1="620" y1="170" x2="1040" y2="170" class="line-thin"/>

      <text x="620" y="205" class="mono-rule">ARCHITECTURE.md</text>
      <text x="620" y="226" class="label-b">How the thing is built. Stack, files, decisions.</text>

      <text x="620" y="270" class="mono-rule">WORKBENCH.md</text>
      <text x="620" y="291" class="label-b">What happened this session. Newest at top.</text>

      <text x="620" y="335" class="mono-rule">USER_GUIDE.md</text>
      <text x="620" y="356" class="label-b">What the thing does, plain language.</text>

      <text x="620" y="400" class="mono-rule">TODOS.md</text>
      <text x="620" y="421" class="label-b">What's next. Honest. Updated at session end.</text>

      <line x1="620" y1="455" x2="1040" y2="455" class="line-thin"/>
      <text x="620" y="490" class="label-b-bold">Why these four:</text>
      <text x="620" y="515" class="label-b">They are the brain of the project.</text>
      <text x="620" y="537" class="label-b">A new Codex thread reads them and remembers</text>
      <text x="620" y="559" class="label-b">where you left off. So do you. So does a teammate.</text>
    </svg>

    <!-- =========== SCENE 5: why .md (and why CLAUDE.md) =========== -->
    <svg class="scene" data-scene="5" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">Why <tspan style="font-family:ui-monospace,Menlo,monospace; fill:#92400e">.md</tspan> ? Why <tspan style="font-family:ui-monospace,Menlo,monospace; fill:#92400e">CLAUDE.md</tspan> ?</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">The format matters as much as the existence.</text>

      <!-- Four reasons in a 2x2 grid -->
      <!-- Top-left: machine-first -->
      <rect x="60" y="110" width="490" height="240" rx="12" class="box"/>
      <text x="80" y="148" class="head-md">1. Machine-first format</text>
      <line x1="80" y1="162" x2="530" y2="162" class="line-thin"/>
      <text x="80" y="194" class="label-b">Plain text. No rendering tax. No tags.</text>
      <text x="80" y="218" class="label-b">LLMs are trained on tons of markdown.</text>
      <text x="80" y="242" class="label-b">Lighter than .docx, lighter than HTML.</text>
      <text x="80" y="266" class="label-b">The model reads it directly, fast and cheap.</text>
      <text x="80" y="306" class="label-sm" style="font-style:italic">It's the right shape for AI to consume.</text>

      <!-- Top-right: human-readable -->
      <rect x="570" y="110" width="490" height="240" rx="12" class="box"/>
      <text x="590" y="148" class="head-md">2. Still human-readable</text>
      <line x1="590" y1="162" x2="1040" y2="162" class="line-thin"/>
      <text x="590" y="194" class="label-b">Any text editor opens it. Forever.</text>
      <text x="590" y="218" class="label-b">A teammate can read it without tools.</text>
      <text x="590" y="242" class="label-b">You in three months can read it.</text>
      <text x="590" y="266" class="label-b">Anyone in 2040 can read it.</text>
      <text x="590" y="306" class="label-sm" style="font-style:italic">Format won't rot. Files won't go obsolete.</text>

      <!-- Bottom-left: CLAUDE.md is a convention -->
      <rect x="60" y="370" width="490" height="240" rx="12" class="highlight" opacity="0.4"/>
      <rect x="60" y="370" width="490" height="240" rx="12" fill="none" stroke="#92400e" stroke-width="2.5"/>
      <text x="80" y="408" class="head-md">3. <tspan style="font-family:ui-monospace,Menlo,monospace">CLAUDE.md</tspan> is a known convention</text>
      <line x1="80" y1="422" x2="530" y2="422" class="line-thin"/>
      <text x="80" y="454" class="label-b">Claude Code looks for it on startup.</text>
      <text x="80" y="478" class="label-b">Codex looks for <tspan class="mono">AGENTS.md</tspan>. Gemini, <tspan class="mono">GEMINI.md</tspan>.</text>
      <text x="80" y="502" class="label-b">Drop one at the project root.</text>
      <text x="80" y="526" class="label-b">The AI reads it every session, no prompt needed.</text>
      <text x="80" y="566" class="label-sm" style="font-style:italic">Persistent system context, free of charge.</text>

      <!-- Bottom-right: compressed prior reasoning -->
      <rect x="570" y="370" width="490" height="240" rx="12" class="box"/>
      <text x="590" y="408" class="head-md">4. Compressed prior reasoning</text>
      <line x1="590" y1="422" x2="1040" y2="422" class="line-thin"/>
      <text x="590" y="454" class="label-b">Bullets. Headings. Tables. The shape</text>
      <text x="590" y="478" class="label-b">your brain already uses to think.</text>
      <text x="590" y="502" class="label-b">The file isn't documentation.</text>
      <text x="590" y="526" class="label-b">It's the thinking you did <tspan style="font-weight:700">once</tspan>,</text>
      <text x="590" y="550" class="label-b">stored cheap, referenced forever.</text>
      <text x="590" y="586" class="label-sm" style="font-style:italic">Write the rule once. Stop re-teaching.</text>
    </svg>

    <!-- =========== SCENE 6: the thread breaks =========== -->
    <svg class="scene" data-scene="6" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">The thread breaks. The files stay.</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">Codex confused. You hit a wall. Doesn't matter. Build keeps going.</text>

      <!-- Chat window crossed out -->
      <rect x="40" y="110" width="440" height="540" rx="12" class="box" opacity="0.55"/>
      <rect x="40" y="110" width="440" height="42" rx="12" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
      <text x="60" y="135" class="label-sm" style="font-weight:700;fill:#b91c1c">Codex chat (this thread)</text>

      <rect x="200" y="180" width="240" height="50" rx="10" fill="#1a1a1a" opacity="0.45"/>
      <rect x="60" y="250" width="320" height="100" rx="10" fill="#fffbe8" stroke="#92400e" stroke-width="2" opacity="0.45"/>
      <rect x="220" y="370" width="220" height="50" rx="10" fill="#1a1a1a" opacity="0.45"/>
      <rect x="60" y="440" width="300" height="160" rx="10" fill="#fffbe8" stroke="#92400e" stroke-width="2" opacity="0.45"/>

      <!-- Big red X across the chat -->
      <line x1="80" y1="170" x2="450" y2="620" class="crossed"/>
      <line x1="450" y1="170" x2="80" y2="620" class="crossed"/>

      <text x="260" y="690" text-anchor="middle" class="label-b-bold" style="fill:#b91c1c">Thread polluted. Close it. Don't fight it.</text>

      <!-- Folder still intact, glowing -->
      <rect x="540" y="110" width="520" height="540" rx="12" class="box" stroke="#16a34a" stroke-width="3"/>
      <rect x="540" y="110" width="520" height="42" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="560" y="135" class="label-sm" style="font-weight:700;fill:#15803d">~/projects/your-build/  still there</text>

      <text x="560" y="182" class="mono">📁 your-build/</text>
      <text x="580" y="210" class="mono">📄 PROJECT.md</text>
      <text x="580" y="234" class="mono">📄 ARCHITECTURE.md</text>
      <text x="580" y="258" class="mono">📄 WORKBENCH.md</text>
      <text x="580" y="282" class="mono">📄 USER_GUIDE.md</text>
      <text x="580" y="306" class="mono">📄 TODOS.md</text>
      <text x="580" y="334" class="mono">📁 src/</text>
      <text x="580" y="358" class="mono">📁 data/</text>
      <text x="580" y="382" class="mono">📁 prompt-journal/</text>

      <text x="560" y="445" class="label-b-bold" style="fill:#15803d">Everything you built is on disk.</text>
      <text x="560" y="470" class="label-b">The thread was just one conversation about it.</text>
      <text x="560" y="495" class="label-b">The project is in the files.</text>
    </svg>

    <!-- =========== SCENE 7: fresh thread, paste PROJECT.md =========== -->
    <svg class="scene" data-scene="7" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <text x="550" y="44" text-anchor="middle" class="head-xl">Fresh thread. Same project.</text>
      <text x="550" y="72" text-anchor="middle" class="label-sm">Open a new Codex thread. First message: paste PROJECT.md. Done.</text>

      <!-- New chat window -->
      <rect x="180" y="110" width="740" height="540" rx="14" class="box"/>
      <rect x="180" y="110" width="740" height="50" rx="14" fill="#f9fafb" stroke="#1a1a1a" stroke-width="2.5"/>
      <circle cx="210" cy="135" r="14" fill="#1a1a1a"/>
      <text x="210" y="140" text-anchor="middle" class="label-b-white" style="font-weight:700">C</text>
      <text x="238" y="132" class="label-b-bold">Codex</text>
      <text x="238" y="150" class="label-sm">new thread, no history</text>

      <!-- User pastes PROJECT.md -->
      <rect x="300" y="190" width="600" height="180" rx="14" class="bubble-user"/>
      <text x="325" y="218" class="label-b-white" style="font-weight:600">You</text>
      <text x="325" y="245" class="label-b-white">Read this. We're picking up where we left off.</text>
      <text x="325" y="275" class="label-sm-white" style="font-style:italic">[pasting PROJECT.md...]</text>
      <rect x="325" y="285" width="555" height="70" rx="6" fill="#262626" stroke="#444" stroke-width="1.5"/>
      <text x="340" y="307" class="label-sm-white" style="font-family:ui-monospace,Menlo,monospace">## Project: coach-evaluator</text>
      <text x="340" y="324" class="label-sm-white" style="font-family:ui-monospace,Menlo,monospace">## Stack: Python + Zoom API + local LLM</text>
      <text x="340" y="341" class="label-sm-white" style="font-family:ui-monospace,Menlo,monospace">## Current state: 3 principles drafted, 1 transcript scored...</text>

      <!-- AI response -->
      <rect x="210" y="400" width="640" height="180" rx="14" class="bubble-ai"/>
      <text x="235" y="428" class="label-b-bold">Codex</text>
      <text x="235" y="458" class="label-b">Got it. I see the three principles, the transcript scored,</text>
      <text x="235" y="481" class="label-b">and the TODO to refine principle 2 based on the miss in session 1.</text>
      <text x="235" y="510" class="label-b" style="font-weight:600">Where do you want to start?</text>

      <text x="550" y="620" text-anchor="middle" class="label-sm" style="font-style:italic">Same project. Different conversation. Zero re-explaining.</text>
    </svg>

    <!-- =========== SCENE 8: finale =========== -->
    <svg class="scene" data-scene="8" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet">
      <rect x="40" y="100" width="1020" height="520" rx="16" class="box-finale"/>

      <text x="550" y="200" text-anchor="middle" class="label-h-white" style="font-size:34px;font-weight:800">The thread is the conversation.</text>
      <text x="550" y="260" text-anchor="middle" class="label-h-white" style="font-size:34px;font-weight:800">The files are the project.</text>

      <line x1="280" y1="310" x2="820" y2="310" stroke="#fde68a" stroke-width="2"/>

      <text x="550" y="370" text-anchor="middle" class="label-h-white-sm">Build accordingly.</text>

      <text x="550" y="445" text-anchor="middle" class="label-sm-white">Drop the rule-pack into your Codex config so the right files always exist.</text>
      <text x="550" y="467" text-anchor="middle" class="label-sm-white">When a thread feels stuck, close it. Open a fresh one. Paste PROJECT.md.</text>
      <text x="550" y="489" text-anchor="middle" class="label-sm-white">Your build was never in the chat.</text>

      <text x="550" y="580" text-anchor="middle" class="label-sm-white" style="opacity:0.7">Alex Salinsky · The Build Room</text>
    </svg>
  </div>

  <div class="caption" id="caption"></div>
  <div class="hud">
    <div class="controls">
      <button id="prev">← Prev</button>
      <button id="next">Next →</button>
    </div>
    <div><strong id="counter">1</strong> / <span id="total">7</span></div>
  </div>
</div>
<div class="hint">← → arrow keys also work</div>

<script>
const captions = [
  "An app is just files. A website is just files. Your build is files too.",
  "Most people picture building as a conversation. That's only half of it.",
  "Underneath the chat, real files are appearing on your computer. That's what your build actually is.",
  "Four of those files keep the project alive between sessions. The rule-pack tells Codex to write them without being asked.",
  "And the format matters. Markdown is machine-first, human-readable, plays nice with the conventions every AI tool already follows.",
  "When the thread breaks, when Codex gets confused, when you have to start over: the files are still there.",
  "Open a fresh thread. Paste PROJECT.md as the first message. The new conversation picks up exactly where the old one stopped.",
  "The thread is the conversation. The files are the project. Build accordingly."
];

let i = 0;
const titleScreen = document.getElementById("titleScreen");
const scenes = document.querySelectorAll(".scene");
const cap = document.getElementById("caption");
const counter = document.getElementById("counter");
const total = document.getElementById("total");
const prev = document.getElementById("prev");
const next = document.getElementById("next");

total.textContent = captions.length;

function render() {
  cap.textContent = captions[i];
  counter.textContent = i + 1;
  prev.disabled = i === 0;
  next.disabled = i === captions.length - 1;

  if (i === 0) {
    titleScreen.style.display = '';
    scenes.forEach(s => s.classList.remove('active'));
  } else {
    titleScreen.style.display = 'none';
    scenes.forEach(s => {
      const step = parseInt(s.dataset.scene);
      s.classList.toggle('active', step === i + 1);
    });
  }
}

prev.onclick = () => { if (i > 0) { i--; render(); } };
next.onclick = () => { if (i < captions.length - 1) { i++; render(); } };

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") next.click();
  if (e.key === "ArrowLeft") prev.click();
});

render();
</script>
</body>
